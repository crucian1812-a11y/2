<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Скачки витязей · 32-bit 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ruslan+Display&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bark:#d9bd8e; --bark-lt:#e8d3a9; --bark-dk:#c6a570;
    --ink:#2e2113; --sepia:#6b4423; --rust:#8a4a1e; --gold:#c79a3b;
    --panel:#f2e7cd; --line:#7a512b; --good:#3f7d4e; --bad:#a23a2e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    color:var(--ink); font-family:"Old Standard TT",Georgia,serif;
    background:
      repeating-linear-gradient(0deg, rgba(70,44,22,.05) 0 2px, transparent 2px 9px),
      linear-gradient(180deg, var(--bark-lt), var(--bark) 50%, var(--bark-dk));
    background-attachment:fixed; overflow-x:hidden; user-select:none; touch-action:manipulation;
  }
  #wrap{position:relative; z-index:1; max-width:980px; margin:0 auto; padding:10px 12px 28px}

  h1{font-family:"Ruslan Display",serif; font-weight:400; text-align:center; line-height:1; margin:.2em 0 .1em;
     font-size:clamp(2rem,8vw,3.2rem); text-shadow:1px 1px 0 rgba(245,232,205,.6)}
  .eyebrow{text-align:center; font-variant:small-caps; letter-spacing:.28em; color:var(--sepia); margin:0; font-size:.8rem}
  p.lead{text-align:center; font-style:italic; color:var(--sepia); margin:.4em auto 1em; max-width:38ch}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px}
  .btn{font-family:"Ruslan Display",serif; cursor:pointer; border:2px solid var(--line); border-radius:8px;
    background:var(--panel); color:var(--ink); padding:10px 18px; font-size:1.05rem; box-shadow:0 3px 0 rgba(60,40,18,.25)}
  .btn:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(60,40,18,.25)}
  .btn.big{display:block; width:100%; max-width:340px; margin:12px auto; padding:16px; font-size:1.3rem}
  .btn.rust{background:var(--rust); color:#fff; border-color:#5d3214}
  .mini{padding:7px 12px; font-size:.95rem}
  a.link{color:var(--rust); text-decoration:none; font-weight:700}
  .foot{text-align:center; color:var(--sepia); font-style:italic; margin-top:18px; font-size:.9rem}

  .heroes{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:14px 0}
  .hero-card{width:200px; background:var(--panel); border:2px solid var(--line); border-radius:14px; padding:12px 10px 14px;
    text-align:center; cursor:pointer; box-shadow:0 4px 12px rgba(60,40,18,.16); transition:transform .12s}
  .hero-card:active{transform:scale(.98)}
  .hero-card.sel{border-color:var(--rust); box-shadow:0 0 0 3px rgba(138,74,30,.3),0 4px 12px rgba(60,40,18,.16)}
  .hero-card canvas{width:150px; height:140px; display:block; margin:0 auto}
  .hero-card .hn{font-family:"Ruslan Display",serif; font-size:1.3rem; margin-top:4px}
  .hero-card .hd{font-size:.82rem; color:var(--sepia); min-height:2.4em}
  .pips{margin-top:4px; font-size:.78rem; color:var(--rust)}

  .map{margin-top:8px}
  .node{display:flex; align-items:center; gap:14px; margin:10px 0; padding:10px 12px; border-radius:12px;
    background:var(--panel); border:2px solid var(--line); box-shadow:0 4px 12px rgba(60,40,18,.16)}
  .node.right{flex-direction:row-reverse; text-align:right}
  .node.locked{opacity:.5; filter:grayscale(.4)}
  .node.playable{cursor:pointer}
  .node.playable:active{transform:scale(.99)}
  .nseal{flex:0 0 auto; width:60px; height:60px; border-radius:50%; border:3px solid var(--rust); display:grid; place-items:center;
    font-size:1.9rem; background:#f6ecd5; box-shadow:inset 0 0 0 3px rgba(138,74,30,.3)}
  .node.done .nseal{border-color:var(--good); background:#e9f3e6}
  .node .nm{font-family:"Ruslan Display",serif; font-size:1.18rem; line-height:1.1}
  .node .sm{font-size:.85rem; color:var(--sepia)}
  .star{color:var(--gold)}

  #stage{position:relative; margin:6px auto 0; max-width:960px}
  #game{display:block; width:100%; height:auto; background:#8fc0e8; border:3px solid var(--line);
    border-radius:10px; box-shadow:0 8px 22px rgba(60,40,18,.25)}
  #stage.fs{position:fixed; inset:0; z-index:90; max-width:none; margin:0; display:flex;
    align-items:center; justify-content:center; background:#000}
  #stage.fs #game{width:auto; height:auto; border:0; border-radius:0; box-shadow:none}
  #fsbtn{position:absolute; top:8px; right:54px; pointer-events:auto; z-index:3}
  #pausebtn{position:absolute; top:8px; right:10px; pointer-events:auto; z-index:3}

  #hud{position:absolute; top:8px; left:10px; right:96px; display:flex; justify-content:space-between; align-items:flex-start;
    font-family:"Ruslan Display",serif; pointer-events:none; color:#fff; text-shadow:1px 1px 0 #000, 0 2px 3px rgba(0,0,0,.6); font-size:1rem; z-index:2}
  .panelbox{background:rgba(20,12,6,.5); border:2px solid rgba(0,0,0,.5); border-radius:6px; padding:5px 9px}
  #place{font-size:1.5rem; line-height:1}
  .hbar{width:150px; height:11px; border:2px solid #000; border-radius:3px; background:#3a1410; overflow:hidden; margin-top:3px}
  .hbar > i{display:block; height:100%; background:linear-gradient(90deg,#e0654f,#7bd987); width:100%}
  .progbar{width:160px; height:8px; border:2px solid #000; border-radius:3px; background:#2a2a3a; overflow:hidden; margin-top:4px}
  .progbar > i{display:block; height:100%; background:linear-gradient(90deg,#c79a3b,#ffe9a0); width:0%}

  #pad{position:absolute; inset:0; pointer-events:none}
  .dbtn,.abtn{position:absolute; display:grid; place-items:center; pointer-events:auto;
    font-family:"Ruslan Display",serif; color:#fff; border:2px solid rgba(0,0,0,.4)}
  .dbtn{width:62px; height:62px; border-radius:12px; background:rgba(242,231,205,.5); color:var(--ink); border-color:rgba(122,81,43,.7); font-size:1.5rem}
  .dbtn:active,.abtn:active{filter:brightness(1.3)}
  #d-left{left:12px; bottom:14px} #d-right{left:84px; bottom:14px}
  .abtn{border-radius:50%}
  #a-gas{right:6px; bottom:10px; width:80px; height:80px; background:rgba(63,125,78,.78); font-size:1rem}
  #a-brake{right:90px; bottom:14px; width:58px; height:58px; background:rgba(162,58,46,.78); font-size:.9rem}
  #a-hit{right:30px; bottom:96px; width:64px; height:64px; background:rgba(178,59,46,.82); font-size:1.6rem}
  body.no-touch #pad{display:none}

  .overlay{position:fixed; inset:0; z-index:20; background:rgba(40,28,16,.74); display:grid; place-items:center; padding:20px}
  .sheet{background:var(--panel); border:3px solid var(--rust); border-radius:16px; padding:22px; max-width:460px;
    text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .sheet h2{font-family:"Ruslan Display",serif; font-weight:400; margin:.2em 0; color:var(--ink); font-size:1.7rem}
  .fact{background:#fbf4e0; border:1px dashed var(--line); border-radius:10px; padding:10px 12px; margin:12px 0; font-size:.95rem; text-align:left}
  .fact b{color:var(--rust)}
  .big-seal{font-size:3rem; color:var(--gold)}
  .seals-row{font-size:1.7rem; color:var(--gold); letter-spacing:4px; margin:6px 0}
  .hidden{display:none !important}
  .kbd{display:inline-block; border:1.5px solid var(--line); border-radius:5px; padding:1px 7px; background:#fbf4e0; font-family:monospace; font-size:.85rem; margin:0 2px}
</style>
</head>
<body>
<div id="wrap">
  <div id="ui"></div>
  <div id="stage" class="hidden">
    <canvas id="game" width="640" height="360"></canvas>
    <div id="hud">
      <div class="panelbox">
        <div id="hname">Витязь</div>
        <div class="hbar"><i id="hhp"></i></div>
        <div class="progbar"><i id="hprog"></i></div>
      </div>
      <div class="panelbox" style="text-align:right">
        <div id="place">1/6</div>
        <div id="speed" style="font-size:.85rem">0 вёрстъ/ч</div>
      </div>
    </div>
    <button class="btn mini" id="pausebtn">II</button>
    <button class="btn mini" id="fsbtn">⛶</button>
    <div id="pad">
      <button class="dbtn" id="d-left">◀</button>
      <button class="dbtn" id="d-right">▶</button>
      <button class="abtn" id="a-brake">тормозъ</button>
      <button class="abtn" id="a-gas">скачи</button>
      <button class="abtn" id="a-hit">⚔</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ===================== AUDIO ===================== */
  let actx=null, muted=false;
  function audio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); return actx; }
  function tone(f,d,t,v){ d=d||0.18; t=t||'sine'; v=v||0.16; const a=audio(); if(!a||muted) return;
    const o=a.createOscillator(), g=a.createGain(); o.type=t; o.frequency.value=f; o.connect(g); g.connect(a.destination);
    const tt=a.currentTime; g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(v,tt+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+d); o.start(tt); o.stop(tt+d+0.03); }
  function noise(d,v){ const a=audio(); if(!a||muted) return; d=d||0.1; v=v||0.16;
    const n=Math.floor(a.sampleRate*d), b=a.createBuffer(1,n,a.sampleRate), ch=b.getChannelData(0);
    for(let i=0;i<n;i++) ch[i]=(Math.random()*2-1)*(1-i/n); const s=a.createBufferSource(); s.buffer=b;
    const g=a.createGain(); g.gain.value=v; s.connect(g); g.connect(a.destination); s.start(); }
  const sHoof=()=>{ tone(70+Math.random()*20,0.05,'sine',0.10); noise(0.03,0.05); };
  const sHit=()=>{ tone(150,0.1,'square',0.2); noise(0.09,0.18); };
  const sBig=()=>{ tone(90,0.2,'square',0.22); noise(0.16,0.22); };
  const sSwing=()=>tone(260,0.08,'sawtooth',0.09);
  const sHurt=()=>tone(180,0.2,'sawtooth',0.16);
  const sBell=(f)=>{ f=f||320; tone(f,1.0,'sine',0.22); tone(f*2.01,0.7,'sine',0.09); };
  const sCrash=()=>{ noise(0.4,0.25); tone(120,0.4,'sawtooth',0.2); };
  function fanfare(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'triangle',0.18),i*120)); }

  /* ===================== STATE ===================== */
  const KEY='vn_gonki_v1', NLEV=3;
  function load(){ try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s&&Array.isArray(s.done)){ while(s.done.length<NLEV) s.done.push(false); return s; } }catch(e){} return {done:new Array(NLEV).fill(false), hero:0}; }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(prog)); }catch(e){} }
  let prog=load();
  const levelPlayable=i=> i===0 || prog.done[i-1]===true;
  const allDone=()=> prog.done.every(Boolean);

  /* ===================== HEROES ===================== */
  // balanced but distinct: top speed / acceleration / combat power, plus horse colour
  const HEROES=[
    {id:'gleb',  name:'Глеб',  cloak:'#c0392b', trim:'#f0cf4d', horse:'#5a3a22', weapon:'axe',
     desc:'Тяжкій всадникъ. Силёнъ въ бою, тише разгонъ.',
     vmax:1.0,  accel:0.82, power:1.5, grip:1.05},
    {id:'fedya', name:'Федя',  cloak:'#2f9e54', trim:'#d6ecae', horse:'#7a5230', weapon:'sword',
     desc:'Лёгкій ѣздокъ. Быстрый разгонъ и вёрткость.',
     vmax:0.96, accel:1.15, power:0.85, grip:1.2},
    {id:'sasha', name:'Саша',  cloak:'#2f6ea8', trim:'#bcd6ef', horse:'#4a4038', weapon:'mace',
     desc:'Удалой гонщикъ. Высшая скорость, ровный нравъ.',
     vmax:1.08, accel:0.95, power:1.1, grip:1.0}
  ];

  /* ===================== LEVELS ===================== */
  const LEVELS=[
    {nm:'Лугами къ Ильменю', sm:'5 соперниковъ', ic:'🐎',
     grass:'#4e8c3e', grass2:'#3f7a33', rumble:'#e7e2d2', road:'#7d7670', road2:'#736d68',
     fact:'Витязи мчатъ заливными лугами вдоль Ильмень-озера. Обойди всѣхъ — и не вылети съ дороги!',
     opps:5, oppV:0.86, oppPow:0.7, laps:1, length:900},
    {nm:'Сквозь Перынскій боръ', sm:'5 соперниковъ', ic:'🌲',
     grass:'#356b3a', grass2:'#2a5a30', rumble:'#d8cfc0', road:'#6f6b66', road2:'#65615c',
     fact:'Тёмный сосновый боръ у Перыни. Дорога вьётся — держи поводья крѣпко да бей лихо!',
     opps:5, oppV:0.93, oppPow:0.95, laps:1, length:1050},
    {nm:'Къ стѣнамъ Детинца', sm:'Послѣдняя скачка', ic:'🏰',
     grass:'#7a7048', grass2:'#6a6040', rumble:'#e0d6c2', road:'#74706b', road2:'#6a6660',
     fact:'Финальная скачка къ воротамъ Кремля. Соперники злы и быстры — победи и стань первымъ витяземъ!',
     opps:5, oppV:1.0, oppPow:1.15, laps:1, length:1200}
  ];

  /* ===================== DOM / CANVAS ===================== */
  const $ui=document.getElementById('ui'), $stage=document.getElementById('stage');
  const cv=document.getElementById('game'); let ctx=cv.getContext('2d');
  const mainCtx=ctx;   // permanent handle to the game canvas context
  const W=cv.width, H=cv.height;
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(!isTouch) document.body.classList.add('no-touch');

  /* ===================== PSEUDO-3D ROAD ===================== */
  const segLen=200, rumbleLen=3, roadWidth=2000, lanes=3;
  const fov=100, camHeight=1000, camDepth=1/Math.tan((fov/2)*Math.PI/180);
  const drawDist=240, fogDensity=4;
  let segments=[], trackLen=0;

  function buildRoad(seedScale){
    segments=[];
    const N=Math.floor(1200*seedScale);
    for(let i=0;i<N;i++){
      const curve = Math.sin(i*0.033)*2.4 + Math.sin(i*0.0092)*1.6 + Math.sin(i*0.05+1.7)*0.8;
      const y = Math.sin(i*0.021)*1500 + Math.sin(i*0.006)*2600;
      const y2 = Math.sin((i+1)*0.021)*1500 + Math.sin((i+1)*0.006)*2600;
      segments.push({ index:i, curve, clip:H, looped:false,
        p1:{world:{x:0,y:y,  z:i*segLen},     camera:{}, screen:{}},
        p2:{world:{x:0,y:y2, z:(i+1)*segLen},  camera:{}, screen:{}} });
    }
    // finish band near the end
    for(let k=0;k<4;k++){ const s=segments[N-6+k]; if(s) s.finish=true; }
    trackLen=N*segLen;
  }
  const findSeg=z=>{ const n=segments.length; let i=Math.floor((z||0)/segLen)%n; if(i<0)i+=n; return segments[i]; };
  function project(p, camX, camY, camZ){
    p.camera.x=(p.world.x||0)-camX; p.camera.y=(p.world.y||0)-camY; p.camera.z=(p.world.z||0)-camZ;
    p.screen.scale=camDepth/p.camera.z;
    p.screen.x=Math.round((W/2) + (p.screen.scale*p.camera.x*W/2));
    p.screen.y=Math.round((H/2) - (p.screen.scale*p.camera.y*H/2));
    p.screen.w=Math.round(p.screen.scale*roadWidth*W/2);
  }
  function poly(x1,y1,x2,y2,x3,y3,x4,y4,col){ ctx.fillStyle=col; ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4); ctx.closePath(); ctx.fill(); }
  const expFog=(d,den)=> 1/Math.pow(Math.E,(d*d*den));

  /* ===================== GAME ===================== */
  let G=null, raf=null, last=0;
  const keys={left:false,right:false,gas:false,brake:false,hit:false,_hit:false};

  function startLevel(idx){
    const M=LEVELS[idx], h=HEROES[prog.hero];
    buildRoad(M.length/900);
    const maxSpeed=segLen*38;       // units / second baseline
    G={ idx, M, hero:h, t:0, paused:false, finished:false,
        pos:0, playerX:0, speed:0, maxSpeed:maxSpeed*h.vmax,
        accel:maxSpeed*h.accel*0.62, brakeA:maxSpeed*1.4, decel:maxSpeed*0.42, offDecel:maxSpeed*1.1,
        hp:100, atk:0, atkHitDone:false, shake:0, flash:0, hurt:0, steerLean:0,
        opps:[], place:1, hoofT:0, done:false, finishPos:trackLen-segLen*3, raceOver:false };
    // spawn opponents ahead, spread along track
    const cols=['#9a3b6e','#3a8a6a','#8a6a2a','#6a3a8a','#aa5a2a','#3a5a8a'];
    for(let i=0;i<M.opps;i++){
      G.opps.push({ z: segLen*(18+i*14)+Math.random()*segLen*6, offset:(Math.random()*1.2-0.6),
        speed:G.maxSpeed*(M.oppV*0.86), targetV:G.maxSpeed*(M.oppV*(0.9+Math.random()*0.16)),
        hp:3, col:cols[i%cols.length], horse:['#5a3a22','#7a5230','#4a4038'][i%3],
        weapon:['sword','axe','mace'][i%3], pow:M.oppPow, atk:0, atkCd:60+Math.random()*120,
        wob:Math.random()*6, crashed:0, name:'Соперникъ '+(i+1) });
    }
    showGame(); updateHUD(); last=performance.now();
    if(raf) cancelAnimationFrame(raf); raf=requestAnimationFrame(frame);
  }

  function frame(ts){ let dt=(ts-last)/1000; last=ts; if(dt>0.05)dt=0.05; if(dt<0)dt=0;
    try{
      if(G&&!G.paused&&!G.finished) update(dt);
      if(G) render();
    }catch(e){ showFatal(e); return; }
    raf=requestAnimationFrame(frame);
  }
  function showFatal(e){
    ctx=mainCtx; ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle='#2a1622'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd0c0'; ctx.font='14px monospace'; ctx.textAlign='center';
    ctx.fillText('Ошибка въ игрѣ:', W/2, H/2-20);
    const msg=String((e&&e.message)||e); ctx.font='11px monospace';
    ctx.fillText(msg.slice(0,70), W/2, H/2+2);
    if(msg.length>70) ctx.fillText(msg.slice(70,140), W/2, H/2+18);
    ctx.textAlign='left';
    if(typeof console!=='undefined') console.error(e);
  }

  function update(dt){
    G.t+=dt*60;
    if(G.shake>0) G.shake-=dt*60; if(G.flash>0) G.flash-=dt*60; if(G.hurt>0) G.hurt-=dt*60;
    const seg=findSeg(G.pos);
    const speedPct=G.speed/G.maxSpeed;

    // ---- input ----
    const hitEdge=keys.hit && !keys._hit; keys._hit=keys.hit;
    if(keys.gas) G.speed+=G.accel*dt; else if(keys.brake) G.speed-=G.brakeA*dt; else G.speed-=G.decel*dt;
    // steering
    const steer = (keys.left?-1:0)+(keys.right?1:0);
    G.playerX += steer * dt * 1.7 * (0.35+speedPct) * G.hero.grip;
    G.steerLean += ((steer*1) - G.steerLean)*Math.min(1,dt*8);
    // centrifugal pull on curves
    G.playerX -= (seg.curve*0.00055) * speedPct * speedPct * dt * 60;
    // off-road
    if((G.playerX<-1 || G.playerX>1) && G.speed>G.offDecel*0.3){ G.speed-=G.offDecel*dt; G.steerLean+=(Math.random()-0.5)*0.4;
      if(Math.floor(G.t)%6===0) noise(0.04,0.06); }
    G.speed=Math.max(0,Math.min(G.maxSpeed,G.speed));
    G.playerX=Math.max(-1.6,Math.min(1.6,G.playerX));
    G.pos+=G.speed*dt; if(G.pos<0)G.pos=0;

    // hoofbeats
    G.hoofT-=dt; if(G.hoofT<=0 && G.speed>40){ sHoof(); G.hoofT=0.42-0.3*speedPct; }

    // ---- player attack ----
    if(hitEdge && G.atk<=0){ G.atk=18; G.atkHitDone=false; sSwing(); }
    if(G.atk>0){ G.atk-=dt*60;
      if(!G.atkHitDone && G.atk<11){ G.atkHitDone=true; playerStrike(); } }

    // ---- opponents ----
    for(const o of G.opps){
      if(o.crashed>0){ o.crashed-=dt*60; o.speed=Math.max(o.speed-G.maxSpeed*0.6*dt, G.maxSpeed*0.2); o.offset+= (o.offSign||1)*dt*0.4; }
      else {
        o.speed += (o.targetV-o.speed)*Math.min(1,dt*0.7);
        // gentle weave + steer back toward racing line, dodge player a bit
        o.wob+=dt; o.offset += Math.sin(o.wob*1.3)*dt*0.18;
        const dz=o.z-G.pos;
        if(dz>0 && dz<segLen*3 && Math.abs(o.offset-G.playerX)<0.5){
          // beside / just ahead of player -> maybe attack back
          o.atkCd-=dt*60;
          if(o.atkCd<=0){ o.atk=14; o.atkCd=120+Math.random()*120; oppStrike(o); }
        }
        o.offset=Math.max(-0.95,Math.min(0.95,o.offset));
      }
      if(o.atk>0) o.atk-=dt*60;
      o.z+=o.speed*dt;
    }

    // ---- standings ----
    let ahead=0; for(const o of G.opps){ if(o.z>G.pos) ahead++; }
    G.place=ahead+1;

    // ---- player crash from 0 hp ----
    if(G.hp<=0 && !G.raceOver){ G.hp=0; }

    // ---- finish ----
    if(G.pos>=G.finishPos && !G.raceOver){ G.raceOver=true; finishRace(); }
    updateHUD();
  }

  function playerStrike(){
    // hit nearest opponent just ahead / beside, on same side of road
    let best=null, bestDz=1e9;
    for(const o of G.opps){ if(o.crashed>0) continue; const dz=o.z-G.pos;
      if(dz>-segLen*1.2 && dz<segLen*4 && Math.abs(o.offset-G.playerX)<0.55){ if(Math.abs(dz)<bestDz){ bestDz=Math.abs(dz); best=o; } } }
    if(best){ best.hp-=1; best.speed*=0.6; best.offSign=(best.offset>G.playerX)?1:-1; best.offset+=best.offSign*0.22;
      G.shake=5; sHit(); floater(best,'БАХ','#ffe27a');
      if(best.hp<=0){ best.crashed=120; best.speed*=0.35; sCrash(); floater(best,'⤵ палъ!','#ff8c6e'); } }
    else { sSwing(); }
  }
  function oppStrike(o){ sBig();
    if(Math.abs(o.offset-G.playerX)<0.45 && G.hurt<=0){
      G.hp-=Math.round(10*o.pow); G.speed*=0.7; G.shake=7; G.flash=8; G.hurt=40; sHurt();
      G.playerX += (G.playerX>o.offset?1:-1)*0.18;
      if(G.hp<0) G.hp=0;
    }
  }
  const floaters=[];
  function floater(o,txt,col){ floaters.push({o, dz:o.z-G.pos, txt, col, life:40}); }

  /* ===================== RENDER ===================== */
  function render(){
    ctx=mainCtx;   // always draw the game to the main canvas, never a leaked preview ctx
    let ox=0,oy=0; if(G.shake>0){ ox=(Math.random()-0.5)*G.shake; oy=(Math.random()-0.5)*G.shake; }
    ctx.save(); ctx.translate(ox,oy);
    drawSky(G.M);

    const base=findSeg(G.pos);
    const basePct=(G.pos%segLen)/segLen;
    const playerY=interp(base.p1.world.y, base.p2.world.y, basePct);
    let maxy=H;
    let x=0, dx=-(base.curve*basePct);

    for(let n=0;n<drawDist;n++){
      const s=segments[(base.index+n)%segments.length];
      s.looped=s.index<base.index; s.clip=maxy;
      const fog=expFog(n/drawDist, fogDensity);
      project(s.p1, (G.playerX*roadWidth)-x,      playerY+camHeight, G.pos-(s.looped?trackLen:0));
      project(s.p2, (G.playerX*roadWidth)-x-dx,   playerY+camHeight, G.pos-(s.looped?trackLen:0));
      x+=dx; dx+=s.curve;
      if(s.p1.camera.z<=camDepth || s.p2.screen.y>=s.p1.screen.y || s.p2.screen.y>=maxy) continue;
      drawSeg(s, fog);
      maxy=s.p1.screen.y;
    }

    // ---- sprites (far -> near) ----
    for(let n=drawDist-1;n>0;n--){
      const s=segments[(base.index+n)%segments.length];
      if(s.p1.screen.scale<=0) continue;
      for(const o of G.opps){
        if(Math.floor(o.z/segLen)%segments.length===s.index){
          const sc=s.p1.screen.scale;
          const sx=s.p1.screen.x + sc*o.offset*roadWidth*W/2;
          const sy=s.p1.screen.y;
          if(sy>s.clip) continue;
          const size=sc*roadWidth*W/2*0.34;
          drawRider(sx, sy, size, {cloak:o.col, trim:'#eee', horse:o.horse, weapon:o.weapon}, G.t+o.wob*30, o.offset*0.3, o.atk>0, o.crashed>0);
        }
      }
    }
    ctx.restore();

    // ---- player (always at bottom) ----
    const psize=H*0.34;
    const lean=G.steerLean*0.5 + (G.shake>0?(Math.random()-0.5)*0.2:0);
    drawRider(W/2+G.steerLean*22, H-24+(G.shake>0?oy:0), psize, {cloak:G.hero.cloak, trim:G.hero.trim, horse:G.hero.horse, weapon:G.hero.weapon}, G.t, lean, G.atk>0, false, G.hurt>0);

    // floaters
    for(const f of floaters){ const dz=f.o.z-G.pos; const s=findSeg(f.o.z);
      project(s.p1,(G.playerX*roadWidth),playerY+camHeight,G.pos);
      const sc=s.p1.screen.scale; if(sc>0){ const sx=s.p1.screen.x+sc*f.o.offset*roadWidth*W/2, sy=s.p1.screen.y-sc*roadWidth*W/2*0.4;
        ctx.fillStyle='#000'; ctx.font='bold 16px "Ruslan Display",serif'; ctx.textAlign='center'; ctx.fillText(f.txt,sx+1,sy+1);
        ctx.fillStyle=f.col; ctx.fillText(f.txt,sx,sy); ctx.textAlign='left'; } f.life--; }
    for(let i=floaters.length-1;i>=0;i--) if(floaters[i].life<=0) floaters.splice(i,1);

    if(G.flash>0){ ctx.fillStyle='rgba(255,80,60,'+(G.flash/8*0.4)+')'; ctx.fillRect(0,0,W,H); }
    // speed lines at high velocity
    if(G.speed>G.maxSpeed*0.75){ ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.lineWidth=2;
      for(let i=0;i<6;i++){ const a=Math.random()*Math.PI*2, r=H*0.5+Math.random()*40; ctx.beginPath();
        ctx.moveTo(W/2+Math.cos(a)*r,H*0.55+Math.sin(a)*r*0.6); ctx.lineTo(W/2+Math.cos(a)*(r+30),H*0.55+Math.sin(a)*(r+30)*0.6); ctx.stroke(); } }
    if(G.paused){ ctx.fillStyle='rgba(20,12,6,.6)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.font='30px "Ruslan Display",serif'; ctx.textAlign='center'; ctx.fillText('Пауза',W/2,H/2); ctx.textAlign='left'; }
  }
  const interp=(a,b,p)=> a+(b-a)*p;

  function drawSky(M){
    let g=ctx.createLinearGradient(0,0,0,H*0.62);
    g.addColorStop(0,'#8fc0e8'); g.addColorStop(1,'#dfeef7'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // sun
    ctx.fillStyle='rgba(255,247,214,.9)'; ctx.beginPath(); ctx.arc(W*0.74,H*0.2,34,0,7); ctx.fill();
    // distant hills band
    ctx.fillStyle='rgba(120,150,110,.55)'; ctx.beginPath(); ctx.moveTo(0,H*0.5);
    for(let x=0;x<=W;x+=40){ ctx.lineTo(x, H*0.5 - 24*Math.abs(Math.sin(x*0.01 + G.pos*0.00006))); } ctx.lineTo(W,H*0.6); ctx.lineTo(0,H*0.6); ctx.fill();
  }

  function rumbleW(w){ return w/Math.max(6,2*lanes); }
  function laneW(w){ return w/Math.max(32,8*lanes); }
  function drawSeg(s, fog){
    const M=G.M, dark=Math.floor(s.index/rumbleLen)%2;
    const grass=dark?M.grass:M.grass2, road=dark?M.road:M.road2;
    const p1=s.p1.screen, p2=s.p2.screen;
    ctx.fillStyle=grass; ctx.fillRect(0,p2.y,W,p1.y-p2.y);
    const r1=rumbleW(p1.w), r2=rumbleW(p2.w), l1=laneW(p1.w), l2=laneW(p2.w);
    poly(p1.x-p1.w-r1,p1.y, p1.x-p1.w,p1.y, p2.x-p2.w,p2.y, p2.x-p2.w-r2,p2.y, M.rumble);
    poly(p1.x+p1.w+r1,p1.y, p1.x+p1.w,p1.y, p2.x+p2.w,p2.y, p2.x+p2.w+r2,p2.y, M.rumble);
    poly(p1.x-p1.w,p1.y, p1.x+p1.w,p1.y, p2.x+p2.w,p2.y, p2.x-p2.w,p2.y, s.finish?'#cfcfcf':road);
    if(s.finish){ // checkered
      for(let c=-2;c<=2;c++){ if((c+Math.floor(s.index/1))%2===0){ const w1=p1.w/3, w2=p2.w/3;
        poly(p1.x+c*w1,p1.y, p1.x+(c+1)*w1,p1.y, p2.x+(c+1)*w2,p2.y, p2.x+c*w2,p2.y, '#1a1a1a'); } } }
    if(dark){ // lane markers on light segments
      poly(p1.x-l1,p1.y, p1.x+l1,p1.y, p2.x+l2,p2.y, p2.x-l2,p2.y, 'rgba(240,240,230,.5)'); }
    if(fog<1){ ctx.globalAlpha=1-fog; ctx.fillStyle=grass; ctx.fillRect(0,p2.y,W,p1.y-p2.y); ctx.globalAlpha=1; }
  }

  /* ---- back-view horse + rider sprite ---- */
  function drawRider(x, gy, s, c, t, lean, attacking, crashed, hurt){
    if(s<3) return;
    ctx.save(); ctx.translate(x,gy); ctx.rotate(lean*0.12);
    const u=s/100;   // unit
    // shadow
    ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(0,0,46*u,12*u,0,0,7); ctx.fill();
    if(crashed){ ctx.rotate(0.5); ctx.translate(-10*u,-6*u); }
    const gallop=Math.sin(t*0.45)*8*u;
    // hind legs
    ctx.strokeStyle='#1a120a'; ctx.lineWidth=8*u; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-20*u,-30*u); ctx.lineTo(-24*u,-4*u+gallop); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(20*u,-30*u); ctx.lineTo(24*u,-4*u-gallop); ctx.stroke();
    // horse rump (back view)
    ctx.fillStyle=c.horse; ctx.strokeStyle='#1a120a'; ctx.lineWidth=3*u;
    ctx.beginPath(); ctx.ellipse(0,-44*u,34*u,40*u,0,0,7); ctx.fill();
    // rump shading
    ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(-12*u,-44*u,12*u,38*u,0,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.ellipse(14*u,-50*u,9*u,26*u,0,0,7); ctx.fill();
    // tail
    ctx.strokeStyle='#15100a'; ctx.lineWidth=10*u; ctx.beginPath(); ctx.moveTo(0,-30*u);
    ctx.quadraticCurveTo(6*u+gallop*0.4,-14*u, 2*u, 4*u); ctx.stroke();
    // saddle
    ctx.fillStyle='#5a3a1c'; ctx.beginPath(); ctx.ellipse(0,-64*u,22*u,12*u,0,0,7); ctx.fill();
    // rider torso (cloak)
    ctx.fillStyle=c.cloak; ctx.strokeStyle='#1a120a'; ctx.lineWidth=3*u;
    ctx.beginPath(); ctx.moveTo(-20*u,-66*u); ctx.lineTo(20*u,-66*u); ctx.lineTo(15*u,-104*u); ctx.lineTo(-15*u,-104*u); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.2)'; ctx.fillRect(-20*u,-66*u,9*u,40*u);
    ctx.fillStyle=c.trim; ctx.fillRect(-16*u,-78*u,32*u,5*u);  // belt/trim
    // shoulders
    ctx.fillStyle=c.cloak; ctx.beginPath(); ctx.ellipse(0,-104*u,17*u,9*u,0,0,7); ctx.fill();
    // helmet/head
    ctx.fillStyle='#c2c7cc'; ctx.beginPath(); ctx.arc(0,-118*u,11*u,0,7); ctx.fill();
    ctx.strokeStyle='#1a120a'; ctx.lineWidth=2*u; ctx.stroke();
    ctx.fillStyle='#9aa0a6'; ctx.fillRect(-11*u,-118*u,22*u,4*u);
    ctx.fillStyle='#c2c7cc'; ctx.fillRect(-2*u,-132*u,4*u,9*u); // шишакъ
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(5*u,-122*u,4*u,0,7); ctx.fill();
    // weapon arm (right side, raised when attacking)
    const aw=attacking? -1.1 - Math.sin(Math.max(0,(18-G.atk))*0.4)*0.6 : 0.25;
    ctx.save(); ctx.translate(20*u,-96*u); ctx.rotate(aw);
    ctx.strokeStyle=c.cloak; ctx.lineWidth=7*u; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-20*u); ctx.stroke();
    ctx.translate(0,-20*u);
    if(c.weapon==='axe'){ ctx.fillStyle='#7a512b'; ctx.fillRect(-2*u,-22*u,4*u,24*u);
      ctx.fillStyle='#c9ced4'; ctx.beginPath(); ctx.moveTo(2*u,-22*u); ctx.lineTo(16*u,-16*u); ctx.lineTo(2*u,-8*u); ctx.closePath(); ctx.fill(); ctx.strokeStyle='#1a120a'; ctx.lineWidth=1.4*u; ctx.stroke(); }
    else if(c.weapon==='mace'){ ctx.fillStyle='#7a512b'; ctx.fillRect(-2*u,-20*u,4*u,22*u);
      ctx.fillStyle='#9aa0a6'; ctx.beginPath(); ctx.arc(0,-24*u,7*u,0,7); ctx.fill(); ctx.strokeStyle='#1a120a'; ctx.lineWidth=1.4*u; ctx.stroke(); }
    else { ctx.fillStyle='#dfe4ea'; ctx.fillRect(-2*u,-30*u,4*u,30*u); ctx.fillStyle='#c79a3b'; ctx.fillRect(-6*u,-4*u,12*u,4*u);
      ctx.strokeStyle='#1a120a'; ctx.lineWidth=1.2*u; ctx.strokeRect(-2*u,-30*u,4*u,30*u); }
    if(attacking){ ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=3*u; ctx.beginPath(); ctx.arc(0,-10*u,26*u,-1.2,0.4); ctx.stroke(); }
    ctx.restore();
    if(hurt && Math.floor(t*0.4)%2===0){ ctx.fillStyle='rgba(255,80,60,.35)'; ctx.beginPath(); ctx.ellipse(0,-90*u,30*u,52*u,0,0,7); ctx.fill(); }
    ctx.restore();
  }

  /* ===================== HUD ===================== */
  function updateHUD(){ if(!G) return;
    document.getElementById('hname').textContent=G.hero.name;
    document.getElementById('hhp').style.width=Math.max(0,G.hp)+'%';
    document.getElementById('hprog').style.width=Math.min(100,100*G.pos/G.finishPos)+'%';
    document.getElementById('place').textContent=G.place+'/'+(G.M.opps+1);
    document.getElementById('speed').textContent=Math.round(G.speed/segLen*4.6)+' вёрстъ/ч';
  }

  /* ===================== SCREENS ===================== */
  const muteBtn=()=>'<button class="btn mini" id="mute">'+(muted?'🔕':'🔔')+'</button>';
  function bindMute(){ const m=document.getElementById('mute'); if(m) m.onclick=()=>{ muted=!muted; m.textContent=muted?'🔕':'🔔'; }; }
  const showUI=()=>{ exitFS(); $stage.classList.add('hidden'); $ui.classList.remove('hidden'); };
  const showGame=()=>{ $ui.classList.add('hidden'); $stage.classList.remove('hidden'); };

  function renderHome(){
    if(window._ha){ cancelAnimationFrame(window._ha); window._ha=null; }
    showUI();
    $ui.innerHTML='<div class="topbar"><span></span>'+muteBtn()+'</div>'+
      '<p class="eyebrow">Великій Новгородъ</p><h1>Скачки витязей</h1>'+
      '<p class="lead">Гонка на лошадяхъ въ духѣ Road Rash: обгоняй соперниковъ да бей ихъ оружіемъ прямо на скаку!</p>'+
      '<button class="btn big rust" id="play">Выбрать витязя ▸</button>'+
      (allDone()?'<button class="btn big" id="reset">Сбросить побѣды</button>':'')+
      '<p class="foot"><a class="link" href="index.html">← къ плану поѣздки</a> · <a class="link" href="igra.html">Игра-походъ</a> · <a class="link" href="boi.html">Бой витязей</a></p>';
    document.getElementById('play').onclick=()=>{ audio(); renderHeroes(); };
    const r=document.getElementById('reset'); if(r) r.onclick=()=>{ prog={done:new Array(NLEV).fill(false),hero:prog.hero}; save(); renderHome(); };
    bindMute();
  }
  function renderHeroes(){
    showUI();
    let html='<div class="topbar"><button class="btn mini" id="home">⌂ Домой</button>'+muteBtn()+'</div>'+
      '<p class="eyebrow">Дружина</p><h1 style="font-size:2rem">Выбери ѣздока</h1><div class="heroes">';
    HEROES.forEach((h,i)=>{ html+='<div class="hero-card'+(prog.hero===i?' sel':'')+'" data-i="'+i+'">'+
      '<canvas width="150" height="140"></canvas><div class="hn">'+h.name+'</div><div class="hd">'+h.desc+'</div>'+
      '<div class="pips">скорость '+'★'.repeat(Math.round(h.vmax*4))+' · разгонъ '+'★'.repeat(Math.round(h.accel*3.5))+' · ударъ '+'★'.repeat(Math.round(h.power*3))+'</div></div>'; });
    html+='</div><button class="btn big rust" id="go">Къ заставамъ ▸</button>';
    $ui.innerHTML=html;
    document.querySelectorAll('.hero-card').forEach(card=>{ const i=+card.dataset.i;
      card.onclick=()=>{ prog.hero=i; save(); sBell(300+i*40); document.querySelectorAll('.hero-card').forEach(x=>x.classList.remove('sel')); card.classList.add('sel'); }; });
    document.getElementById('home').onclick=renderHome; document.getElementById('go').onclick=renderMap; bindMute();
    if(window._ha) cancelAnimationFrame(window._ha);
    const cs=Array.from(document.querySelectorAll('.hero-card canvas'));
    (function loop(ts){ cs.forEach((c,i)=>{ const g=c.getContext('2d'); g.clearRect(0,0,150,140);
      drawHeroPreview(g,HEROES[i],ts*0.05); }); window._ha=requestAnimationFrame(loop); })(0);
  }
  function drawHeroPreview(g,h,t){
    const real=ctx; ctx=g;   // redirect drawing helpers to the preview canvas
    try{ drawRider(75,128,128,{cloak:h.cloak,trim:h.trim,horse:h.horse,weapon:h.weapon},t,Math.sin(t*0.04)*0.4,false,false); }
    finally{ ctx=real; }     // ALWAYS restore, even if drawing throws
  }

  function renderMap(){
    if(window._ha){ cancelAnimationFrame(window._ha); window._ha=null; }
    showUI();
    let html='<div class="topbar"><button class="btn mini" id="back">‹ Ѣздоки</button>'+muteBtn()+'</div>'+
      '<p class="eyebrow">Скачки '+HEROES[prog.hero].name+'а</p><h1 style="font-size:2rem">Выбери заставу</h1><div class="map">';
    for(let i=0;i<NLEV;i++){ const M=LEVELS[i], done=prog.done[i], play=levelPlayable(i);
      html+='<div class="node '+(i%2?'right ':'')+(done?'done ':'')+(play?'playable':'locked')+'" data-i="'+i+'">'+
        '<div class="nseal">'+(play?M.ic:'🔒')+'</div><div><div class="nm">'+(i+1)+'. '+M.nm+'</div>'+
        '<div class="sm">'+M.sm+' '+(done?'<span class="star">★ побѣда</span>':'')+'</div></div></div>'; }
    html+='</div>'+(allDone()?'<button class="btn big rust" id="win">Грамота чемпіона ▸</button>':'')+
      '<p class="foot"><a class="link" href="index.html">← къ плану поѣздки</a></p>';
    $ui.innerHTML=html;
    document.getElementById('back').onclick=renderHeroes;
    const w=document.getElementById('win'); if(w) w.onclick=renderWin;
    document.querySelectorAll('.node.playable').forEach(n=>n.onclick=()=>introLevel(+n.dataset.i)); bindMute();
  }
  function introLevel(i){
    const M=LEVELS[i];
    const ov=mkOverlay('<p class="eyebrow">Застава '+(i+1)+'</p><h2>'+M.nm+'</h2>'+
      '<p style="font-style:italic;color:var(--sepia);margin:.2em 0">'+M.sm+'</p>'+
      '<div class="fact">'+M.fact+'</div>'+
      '<p style="font-size:.88rem">'+(isTouch
        ? '◀▶ — поводья, «скачи» — газъ, «тормозъ» — сдержать, ⚔ — ударить соперника рядомъ. ⛶ — на весь экранъ.'
        : '<span class="kbd">←→</span> — поводья, <span class="kbd">↑</span> — скакать, <span class="kbd">↓</span> — тормозъ, <span class="kbd">Space</span> — ударъ.')+'</p>'+
      '<p style="font-size:.9rem"><b>Цѣль:</b> прискакать въ тройкѣ первыхъ.</p>'+
      '<button class="btn big rust" id="begin">На старт! ▸</button><button class="btn" id="cancel">Назадъ</button>');
    document.getElementById('begin').onclick=()=>{ ov.remove(); startLevel(i); };
    document.getElementById('cancel').onclick=()=>ov.remove();
  }

  function finishRace(){ if(G.finished) return; G.finished=true;
    const win = G.place<=3 && G.hp>0;
    if(win){ prog.done[G.idx]=true; save(); fanfare(); } else sCrash();
    const more=G.idx<NLEV-1;
    const place=G.place, pl=['','I','II','III','IV','V','VI'][place]||place;
    const ov=mkOverlay('<div class="big-seal">'+(win?'🏆':'🐎')+'</div><h2>'+(win?'Витязь въ тройкѣ!':'Не успѣлъ…')+'</h2>'+
      '<p>'+G.hero.name+' пришёлъ '+pl+'-мъ изъ '+(G.M.opps+1)+'.</p>'+
      (win?(allDone()?'<p>Всѣ заставы покорены!</p>':''):'<p>Нужно въ тройку первыхъ. Попробуй снова!</p>')+
      '<button class="btn big rust" id="next">'+(win?(allDone()?'Грамота чемпіона ▸':(more?'Слѣдующая застава ▸':'Къ заставамъ ▸')):'Снова ▸')+'</button>'+
      '<button class="btn" id="map">Къ заставамъ</button>');
    document.getElementById('next').onclick=()=>{ ov.remove(); const ni=G.idx+1; const idx=G.idx; stopGame();
      if(win){ if(allDone()) renderWin(); else if(more) introLevel(ni); else renderMap(); } else startLevel(idx); };
    document.getElementById('map').onclick=()=>{ ov.remove(); stopGame(); renderMap(); };
  }
  function stopGame(){ if(raf) cancelAnimationFrame(raf); raf=null; G=null; }
  function renderWin(){ showUI();
    $ui.innerHTML='<div class="topbar"><button class="btn mini" id="back">‹ Заставы</button>'+muteBtn()+'</div>'+
      '<p class="eyebrow">Слава!</p><h1>Грамота чемпіона</h1>'+
      '<div class="node" style="display:block;text-align:center"><div class="big-seal">🏅</div><div class="seals-row">★ ★ ★</div>'+
      '<p><b>'+HEROES[prog.hero].name+'</b> обскакалъ всѣхъ соперниковъ Новгородской земли!</p>'+
      '<div class="fact">• лугами къ Ильменю;<br>• сквозь Перынскій боръ;<br>• къ стѣнамъ Детинца.</div>'+
      '<button class="btn big rust" id="again">Скакать заново</button><button class="btn big" id="hero2">Другой витязь</button></div>'+
      '<p class="foot"><a class="link" href="boi.html">⚔️ Бой витязей ▸</a> · <a class="link" href="igra.html">🎮 Игра-походъ ▸</a><br><a class="link" href="index.html">← къ плану поѣздки</a></p>';
    document.getElementById('again').onclick=()=>{ prog.done=new Array(NLEV).fill(false); save(); renderMap(); };
    document.getElementById('hero2').onclick=()=>{ prog.done=new Array(NLEV).fill(false); save(); renderHeroes(); };
    document.getElementById('back').onclick=renderMap; bindMute();
  }
  function mkOverlay(inner){ const ov=document.createElement('div'); ov.className='overlay'; ov.innerHTML='<div class="sheet">'+inner+'</div>';
    const host=document.fullscreenElement||document.webkitFullscreenElement||document.body; host.appendChild(ov); return ov; }

  /* ===================== CONTROLS ===================== */
  const KMAP={ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right',
    ArrowUp:'gas',w:'gas',W:'gas',ArrowDown:'brake',s:'brake',S:'brake',
    ' ':'hit',j:'hit',J:'hit',k:'hit',K:'hit'};
  window.addEventListener('keydown',e=>{ if(e.key==='Escape'){ if(G&&!G.finished){ G.paused=!G.paused; if(!G.paused) last=performance.now(); } return; }
    const k=KMAP[e.key]; if(k){ keys[k]=true; if(e.key===' '||e.key.startsWith('Arrow')) e.preventDefault(); } });
  window.addEventListener('keyup',e=>{ const k=KMAP[e.key]; if(k) keys[k]=false; });
  function bindHold(id,prop){ const el=document.getElementById(id); if(!el) return;
    const on=e=>{ e.preventDefault(); audio(); keys[prop]=true; }; const off=e=>{ e.preventDefault(); keys[prop]=false; };
    el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off); el.addEventListener('touchcancel',off);
    el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off); }
  bindHold('d-left','left'); bindHold('d-right','right'); bindHold('a-gas','gas'); bindHold('a-brake','brake'); bindHold('a-hit','hit');
  document.getElementById('pausebtn').onclick=()=>{ if(!G||G.finished) return; if(!G.paused){ G.paused=true;
    const ov=mkOverlay('<h2>Пауза</h2><button class="btn big rust" id="resume">Продолжить ▸</button><button class="btn" id="toMap">Къ заставамъ</button>');
    document.getElementById('resume').onclick=()=>{ ov.remove(); G.paused=false; last=performance.now(); };
    document.getElementById('toMap').onclick=()=>{ ov.remove(); stopGame(); renderMap(); }; } };

  /* ===================== FULLSCREEN ===================== */
  function fitStage(){
    if(document.fullscreenElement || document.webkitFullscreenElement){
      const ar=W/H, ww=window.innerWidth, wh=window.innerHeight;
      let w=ww, h=w/ar; if(h>wh){ h=wh; w=h*ar; }
      cv.style.width=Math.floor(w)+'px'; cv.style.height=Math.floor(h)+'px';
    } else { cv.style.width=''; cv.style.height=''; }
  }
  function toggleFullscreen(){
    const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
    if(!fsEl){ const req=$stage.requestFullscreen||$stage.webkitRequestFullscreen; if(req) req.call($stage);
      $stage.classList.add('fs'); if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }
    else { const ex=document.exitFullscreen||document.webkitExitFullscreen; if(ex) ex.call(document); $stage.classList.remove('fs'); }
  }
  function exitFS(){ if(document.fullscreenElement||document.webkitFullscreenElement){ const ex=document.exitFullscreen||document.webkitExitFullscreen; if(ex) ex.call(document); }
    $stage.classList.remove('fs'); cv.style.width=''; cv.style.height=''; }
  document.getElementById('fsbtn').onclick=toggleFullscreen;
  document.addEventListener('fullscreenchange',()=>{ if(!document.fullscreenElement) $stage.classList.remove('fs'); fitStage(); });
  document.addEventListener('webkitfullscreenchange',fitStage);
  window.addEventListener('resize',fitStage);
  window.addEventListener('orientationchange',()=>setTimeout(fitStage,200));

  renderHome();
})();
</script>
</body>
