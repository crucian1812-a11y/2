<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Витязи Новгорода · игра</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ruslan+Display&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bark:#d9bd8e; --bark-lt:#e8d3a9; --bark-dk:#c6a570;
    --ink:#2e2113; --sepia:#6b4423; --rust:#8a4a1e; --gold:#c79a3b;
    --panel:#f2e7cd; --line:#7a512b; --good:#3f7d4e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    color:var(--ink); font-family:"Old Standard TT",Georgia,serif;
    background:
      repeating-linear-gradient(0deg, rgba(70,44,22,.05) 0 2px, transparent 2px 9px),
      linear-gradient(180deg, var(--bark-lt), var(--bark) 50%, var(--bark-dk));
    background-attachment:fixed; overflow-x:hidden; user-select:none; touch-action:manipulation;
  }
  body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.4; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.012 0.16' numOctaves='2' seed='5'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/></svg>");}

  #wrap{position:relative; z-index:1; max-width:980px; margin:0 auto; padding:10px 12px 28px}

  h1{font-family:"Ruslan Display",serif; font-weight:400; text-align:center; line-height:1; margin:.2em 0 .1em;
     font-size:clamp(2rem,8vw,3.2rem); text-shadow:1px 1px 0 rgba(245,232,205,.6)}
  .eyebrow{text-align:center; font-variant:small-caps; letter-spacing:.28em; color:var(--sepia); margin:0; font-size:.8rem}
  p.lead{text-align:center; font-style:italic; color:var(--sepia); margin:.4em auto 1em; max-width:36ch}

  .topbar{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px}
  .btn{font-family:"Ruslan Display",serif; cursor:pointer; border:2px solid var(--line); border-radius:8px;
    background:var(--panel); color:var(--ink); padding:10px 18px; font-size:1.05rem; box-shadow:0 3px 0 rgba(60,40,18,.25)}
  .btn:active{transform:translateY(2px); box-shadow:0 1px 0 rgba(60,40,18,.25)}
  .btn.big{display:block; width:100%; max-width:340px; margin:12px auto; padding:16px; font-size:1.3rem}
  .btn.rust{background:var(--rust); color:#fff; border-color:#5d3214}
  .mini{padding:7px 12px; font-size:.95rem}
  a.link{color:var(--rust); text-decoration:none; font-weight:700}
  .foot{text-align:center; color:var(--sepia); font-style:italic; margin-top:18px; font-size:.9rem}

  /* character select */
  .heroes{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:14px 0}
  .hero-card{width:170px; background:var(--panel); border:2px solid var(--line); border-radius:14px; padding:12px 10px 14px;
    text-align:center; cursor:pointer; box-shadow:0 4px 12px rgba(60,40,18,.16); transition:transform .12s}
  .hero-card:active{transform:scale(.98)}
  .hero-card.sel{border-color:var(--rust); box-shadow:0 0 0 3px rgba(138,74,30,.3),0 4px 12px rgba(60,40,18,.16)}
  .hero-card canvas{width:120px; height:150px; display:block; margin:0 auto}
  .hero-card .hn{font-family:"Ruslan Display",serif; font-size:1.3rem; margin-top:4px}
  .hero-card .hd{font-size:.82rem; color:var(--sepia); min-height:2.4em}
  .pips{margin-top:4px; font-size:.78rem; color:var(--rust)}

  /* level map */
  .map{margin-top:8px}
  .node{display:flex; align-items:center; gap:14px; margin:10px 0; padding:10px 12px; border-radius:12px;
    background:var(--panel); border:2px solid var(--line); box-shadow:0 4px 12px rgba(60,40,18,.16)}
  .node.right{flex-direction:row-reverse; text-align:right}
  .node.locked{opacity:.5; filter:grayscale(.4)}
  .node.playable{cursor:pointer}
  .node.playable:active{transform:scale(.99)}
  .nseal{flex:0 0 auto; width:60px; height:60px; border-radius:50%; border:3px solid var(--rust); display:grid; place-items:center;
    font-size:1.9rem; background:#f6ecd5; box-shadow:inset 0 0 0 3px rgba(138,74,30,.3)}
  .node.done .nseal{border-color:var(--good); background:#e9f3e6}
  .node .nm{font-family:"Ruslan Display",serif; font-size:1.18rem; line-height:1.1}
  .node .sm{font-size:.85rem; color:var(--sepia)}
  .star{color:var(--gold)}

  /* game */
  #stage{position:relative; margin:6px auto 0; max-width:960px}
  #game{display:block; width:100%; height:auto; background:#bfe0ef; border:3px solid var(--line);
    border-radius:12px; box-shadow:0 8px 22px rgba(60,40,18,.25)}
  #hud{position:absolute; top:10px; left:12px; right:12px; display:flex; justify-content:space-between;
    align-items:flex-start; font-family:"Ruslan Display",serif; pointer-events:none; color:#fff;
    text-shadow:0 2px 3px rgba(0,0,0,.5); font-size:1.05rem}
  #hud .right{text-align:right}
  #pausebtn{position:absolute; top:8px; right:10px}
  #stage.fs{position:fixed; inset:0; z-index:90; max-width:none; margin:0; display:flex;
    align-items:center; justify-content:center; background:#000}
  #stage.fs #game{width:auto; height:auto; border:0; border-radius:0; box-shadow:none}
  #fsbtn{position:absolute; top:8px; right:54px}

  /* touch controls */
  #pad{position:absolute; inset:0; pointer-events:none}
  .tbtn{position:absolute; bottom:14px; width:74px; height:74px; border-radius:50%;
    background:rgba(242,231,205,.55); border:3px solid rgba(122,81,43,.7); color:var(--ink);
    font-size:1.9rem; display:grid; place-items:center; pointer-events:auto;
    font-family:"Ruslan Display",serif}
  .tbtn:active{background:rgba(138,74,30,.7); color:#fff}
  #b-left{left:14px}
  #b-right{left:100px}
  #b-jump{right:14px; width:88px; height:88px; bottom:10px; background:rgba(138,74,30,.55); color:#fff}
  body.no-touch #pad{display:none}

  /* overlay */
  .overlay{position:fixed; inset:0; z-index:20; background:rgba(40,28,16,.74); display:grid; place-items:center; padding:20px}
  .sheet{background:var(--panel); border:3px solid var(--rust); border-radius:16px; padding:22px; max-width:440px;
    text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .sheet h2{font-family:"Ruslan Display",serif; font-weight:400; margin:.2em 0; color:var(--ink); font-size:1.7rem}
  .fact{background:#fbf4e0; border:1px dashed var(--line); border-radius:10px; padding:10px 12px; margin:12px 0;
    font-size:.95rem; text-align:left}
  .fact b{color:var(--rust)}
  .big-seal{font-size:3rem; color:var(--gold)}
  .seals-row{font-size:1.7rem; color:var(--gold); letter-spacing:4px; margin:6px 0}
  .hidden{display:none !important}
  .kbd{display:inline-block; border:1.5px solid var(--line); border-radius:5px; padding:1px 7px; background:#fbf4e0;
    font-family:monospace; font-size:.85rem; margin:0 2px}
</style>
</head>
<body>
<div id="wrap">
  <div id="ui"></div>

  <div id="stage" class="hidden">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="hud"><div class="left" id="hud-l"></div><div class="right" id="hud-r"></div></div>
    <button class="btn mini" id="pausebtn">II</button>
    <button class="btn mini" id="fsbtn">⛶</button>
    <div id="pad">
      <button class="tbtn" id="b-left">◀</button>
      <button class="tbtn" id="b-right">▶</button>
      <button class="tbtn" id="b-jump">⤴</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ====================== AUDIO ====================== */
  let actx=null, muted=false;
  function audio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); return actx; }
  function tone(freq,dur,type,vol){ dur=dur||0.25; type=type||'sine'; vol=vol||0.18; const a=audio(); if(!a||muted) return;
    const o=a.createOscillator(), g=a.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
    const t=a.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.03); }
  function sJump(){ tone(380,0.16,'square',0.14); tone(560,0.12,'square',0.10); }
  function sCoin(){ tone(880,0.08,'triangle',0.16); setTimeout(()=>tone(1320,0.12,'triangle',0.14),60); }
  function sStomp(){ tone(200,0.12,'square',0.16); }
  function sHurt(){ tone(150,0.3,'sawtooth',0.16); }
  function sBell(f){ f=f||320; tone(f,1.2,'sine',0.26); tone(f*2.01,0.9,'sine',0.10); }
  function fanfare(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'triangle',0.18), i*120)); }

  /* ====================== STATE ====================== */
  const KEY='vn_vityaz_v1', NLEV=3;
  function load(){ try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s&&Array.isArray(s.done)){ while(s.done.length<NLEV) s.done.push(false); return s; } }catch(e){} return {done:new Array(NLEV).fill(false), hero:0}; }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(prog)); }catch(e){} }
  let prog=load();
  function levelPlayable(i){ return i===0 || prog.done[i-1]===true; }
  function allDone(){ return prog.done.every(Boolean); }

  /* ====================== HEROES ====================== */
  const HEROES=[
    {id:'gleb',  name:'Глеб',  cloak:'#b23b2e', trim:'#e6c34d', emblem:'sun',   desc:'Силачъ. Высоко прыгаетъ.',   speed:6.0, jump:16.6},
    {id:'fedya', name:'Федя',  cloak:'#2f8a4e', trim:'#cfe0a8', emblem:'tree',  desc:'Ловкій. Быстро бѣгаетъ.',    speed:7.2, jump:15.2},
    {id:'sasha', name:'Саша',  cloak:'#2f6ea8', trim:'#bcd6ef', emblem:'wave',  desc:'Стойкій. Всё умѣетъ ровно.', speed:6.5, jump:15.8}
  ];

  /* ====================== LEVELS ====================== */
  function mkBlock(x,y,kind){ return {x,y,w:36,h:36,kind:kind||'brick',used:false,bump:0}; }

  function L1(){ // Ярославово дворище — торгъ на берегу Волхова
    const P=[], C=[], E=[], CP=[], B=[], HZ=[];
    const gy=460, gh=170;
    [[0,620],[760,520],[1360,360],[1820,560],[2480,360],[2980,540],[3640,820]].forEach(s=>P.push({x:s[0],y:gy,w:s[1],h:gh}));
    [[560,392,110,26],[1180,348,120,26],[2020,392,120,26],[2420,324,120,26],[2880,300,130,26],[3380,360,120,26]].forEach(p=>P.push({x:p[0],y:p[1],w:p[2],h:p[3],wood:true}));
    [[680,300,'brick'],[716,300,'coinbox'],[752,300,'brick'],
     [1220,288,'brick'],[1256,288,'powbox'],[1292,288,'brick'],
     [2060,300,'coinbox'],
     [2900,212,'brick'],[2936,212,'coinbox'],[2972,212,'brick'],
     [3400,300,'brick'],[3436,300,'brick']].forEach(b=>B.push(mkBlock(b[0],b[1],b[2])));
    [[1300,gy-22,110],[3070,gy-22,80]].forEach(s=>HZ.push({x:s[0],y:s[1],w:s[2],h:22}));
    [[300,400],[360,400],[420,400],[600,348],[640,348],[1190,304],[1230,304],[1500,400],[1560,400],
     [2060,348],[2160,400],[2220,400],[2440,280],[2900,168],[3140,400],[3200,400],[3460,316],[3760,400],[3820,400]]
      .forEach(c=>C.push({x:c[0],y:c[1]}));
    E.push({x:880,y:gy,type:'boar',x0:780,x1:1180,dir:1});
    E.push({x:1700,y:gy-92,type:'raven',x0:1640,x1:1860,dir:1});
    E.push({x:2600,y:gy,type:'hedgehog',x0:2500,x1:2760,dir:1});
    E.push({x:3300,y:gy,type:'boar',x0:3120,x1:3540,dir:-1});
    CP.push({x:1900,y:gy});
    return {name:'Ярославово дворище', sub:'Торгъ на берегу Волхова',
      fact:'<b>Ярославово дворище</b> — древній торгъ Новгорода. Сюда по рѣкѣ Волховъ приплывали ладьи купцовъ со всего свѣта.',
      theme:'torg', platforms:P, coins:C, enemies:E, checkpoints:CP, blocks:B, hazards:HZ,
      goalX:4000, goalKind:'bell', width:4400, start:{x:60,y:380}};
  }
  function L2(){ // Новгородскій Детинецъ — крѣпость
    const P=[], C=[], E=[], CP=[], B=[], HZ=[];
    const gy=470, gh=150;
    [[0,560],[700,440],[1240,360],[1700,520],[2360,360],[2880,520],[3500,820]].forEach(s=>P.push({x:s[0],y:gy,w:s[1],h:gh}));
    [[540,410,120,28],[700,348,120,28],[860,286,130,28],[1320,372,120,28],[1460,300,120,28],
     [1980,372,120,28],[2480,360,120,28],[2620,288,120,28],[3060,372,120,28],[3200,300,130,28]]
      .forEach(p=>P.push({x:p[0],y:p[1],w:p[2],h:p[3],wall:true}));
    [[900,224,'brick'],[936,224,'coinbox'],[972,224,'brick'],
     [1500,238,'powbox'],
     [2020,300,'brick'],[2056,300,'coinbox'],[2092,300,'brick'],
     [2660,226,'coinbox'],
     [3240,238,'brick'],[3276,238,'brick'],[3312,238,'coinbox']].forEach(b=>B.push(mkBlock(b[0],b[1],b[2])));
    [[1170,gy-22,100],[2300,gy-22,90],[3420,gy-22,70]].forEach(s=>HZ.push({x:s[0],y:s[1],w:s[2],h:22}));
    [[300,410],[360,410],[560,360],[720,298],[890,236],[1340,322],[1480,250],
     [1520,250],[2000,322],[2060,322],[2500,310],[2660,178],[2700,178],
     [2980,420],[3040,420],[3260,250],[3360,400],[3420,400]]
      .forEach(c=>C.push({x:c[0],y:c[1]}));
    E.push({x:1000,y:gy,type:'boar',x0:760,x1:1180,dir:1});
    E.push({x:1400,y:gy-96,type:'raven',x0:1280,x1:1560,dir:1});
    E.push({x:2000,y:gy,type:'hedgehog',x0:1860,x1:2160,dir:-1});
    E.push({x:2600,y:gy-96,type:'raven',x0:2500,x1:2760,dir:1});
    E.push({x:3200,y:gy,type:'boar',x0:2980,x1:3420,dir:-1});
    CP.push({x:1900,y:gy});
    return {name:'Новгородскій Детинецъ', sub:'Стѣны и башни Кремля',
      fact:'<b>Детинецъ</b> — Новгородскій Кремль. Его краснокирпичныя стѣны и башни берегли городъ много вѣковъ. Заберись на стѣну!',
      theme:'kreml', platforms:P, coins:C, enemies:E, checkpoints:CP, blocks:B, hazards:HZ,
      goalX:3820, goalKind:'gate', width:4320, start:{x:60,y:390}};
  }
  function L3(){ // Софійскій соборъ — къ золотому куполу
    const P=[], C=[], E=[], CP=[], B=[], HZ=[];
    const gy=470, gh=150;
    [[0,600],[760,360],[1240,300],[1680,360],[2120,420],[2620,360],[3180,840]].forEach(s=>P.push({x:s[0],y:gy,w:s[1],h:gh}));
    [[600,392,120,28],[940,348,110,28],[1340,360,120,28],[1480,296,120,28],
     [1820,360,120,28],[1960,292,120,28],[2100,224,150,28],
     [2520,372,120,28],[2660,300,120,28],[2860,228,150,28]].forEach(p=>P.push({x:p[0],y:p[1],w:p[2],h:p[3],stone:true}));
    [[1000,256,'brick'],[1036,256,'coinbox'],[1072,256,'brick'],
     [1520,200,'powbox'],
     [1980,196,'brick'],[2016,196,'coinbox'],[2052,196,'brick'],
     [2700,204,'coinbox'],
     [2900,160,'brick'],[2936,160,'brick'],[2972,160,'coinbox']].forEach(b=>B.push(mkBlock(b[0],b[1],b[2])));
    [[1160,gy-22,90],[1640,gy-22,90],[2560,gy-22,80]].forEach(s=>HZ.push({x:s[0],y:s[1],w:s[2],h:22}));
    [[340,410],[400,410],[640,348],[700,348],[980,304],[1300,316],
     [1380,316],[1520,252],[1860,316],[2000,248],[2150,180],[2210,180],
     [2560,328],[2700,256],[2900,116],[2960,116],[3220,400],[3280,400]]
      .forEach(c=>C.push({x:c[0],y:c[1]}));
    E.push({x:900,y:gy-96,type:'raven',x0:780,x1:1080,dir:1});
    E.push({x:1400,y:gy,type:'hedgehog',x0:1280,x1:1560,dir:1});
    E.push({x:1850,y:gy-96,type:'raven',x0:1700,x1:2000,dir:1});
    E.push({x:2300,y:gy,type:'boar',x0:2140,x1:2560,dir:-1});
    E.push({x:2740,y:gy,type:'hedgehog',x0:2640,x1:2900,dir:1});
    CP.push({x:1900,y:gy});
    return {name:'Софійскій соборъ', sub:'Къ золотой главѣ',
      fact:'<b>Софійскій соборъ</b> стоитъ почти 1000 лѣтъ. У него пять главъ, а средняя — золотая. «Гдѣ Софія — тамъ и Новгородъ».',
      theme:'sofia', platforms:P, coins:C, enemies:E, checkpoints:CP, blocks:B, hazards:HZ,
      goalX:3760, goalKind:'dome', width:4260, start:{x:60,y:400}};
  }
  const LEVEL_FNS=[L1,L2,L3];
  const LEVEL_META=[
    {ic:'⛵', nm:'Ярославово дворище', sm:'Торгъ на Волховѣ'},
    {ic:'🏰', nm:'Новгородскій Детинецъ', sm:'Стѣны Кремля'},
    {ic:'⛪', nm:'Софійскій соборъ', sm:'Золотая глава'}
  ];

  /* ====================== DOM ====================== */
  const $ui=document.getElementById('ui');
  const $stage=document.getElementById('stage');
  const cv=document.getElementById('game'), ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(!isTouch) document.body.classList.add('no-touch');

  /* ====================== KNIGHT DRAW ====================== */
  function drawKnight(g, cx, feetY, sc, hero, facing, t, state){
    g.save();
    g.translate(cx, feetY);
    g.scale(sc*(facing<0?-1:1), sc);
    const run = state==='run';
    const jump = state==='jump';
    const ph = run ? Math.sin(t*0.28) : 0;
    const bob = run ? Math.abs(Math.sin(t*0.28))*1.5 : (state==='idle'? Math.sin(t*0.06)*1.0 : 0);
    g.translate(0, -bob);
    g.fillStyle='rgba(40,25,10,.18)'; g.beginPath(); g.ellipse(0, 2+bob, 16, 4, 0,0,7); g.fill();
    const legSwing = jump? 6 : ph*7;
    drawLeg(g, -5,  legSwing, hero);
    drawLeg(g,  5, -legSwing, hero);
    g.fillStyle=hero.cloak; roundRect(g, -13, -46, 26, 30, 7); g.fill();
    g.fillStyle='#9aa0a6'; roundRect(g, -12, -48, 24, 8, 4); g.fill();
    g.fillStyle=hero.trim; g.fillRect(-13,-22,26,5);
    g.save(); g.translate(8,-42); g.rotate((jump?-0.9:-0.5)+ph*0.15);
    g.strokeStyle='#cfd3d8'; g.lineWidth=3; g.lineCap='round';
    g.beginPath(); g.moveTo(0,0); g.lineTo(0,-26); g.stroke();
    g.strokeStyle=hero.trim; g.lineWidth=5; g.beginPath(); g.moveTo(-5,0); g.lineTo(5,0); g.stroke();
    g.restore();
    g.save(); g.translate(0,-52);
    g.fillStyle='#f0c89a'; g.beginPath(); g.arc(0,0,9,0,7); g.fill();
    g.fillStyle=hero.id==='fedya'? '#7a4a22':'#5a3a1c'; g.beginPath(); g.arc(0,3,8,0.15,Math.PI-0.15); g.fill();
    g.fillStyle='#c2c7cc'; g.beginPath(); g.moveTo(-10,0); g.quadraticCurveTo(-11,-12,0,-18); g.quadraticCurveTo(11,-12,10,0); g.closePath(); g.fill();
    g.fillStyle='#9aa0a6'; g.fillRect(-10,-3,20,3);
    g.strokeStyle='#9aa0a6'; g.lineWidth=2; g.beginPath(); g.moveTo(0,-18); g.lineTo(0,-24); g.stroke();
    g.fillStyle=hero.trim; g.beginPath(); g.arc(0,-25,2,0,7); g.fill();
    g.fillStyle='#b6bbc0'; g.fillRect(-1.5,-6,3,8);
    g.restore();
    g.save(); g.translate(-9,-34+ (run?ph*1.5:0));
    g.fillStyle=hero.cloak; g.beginPath(); g.arc(0,0,12,0,7); g.fill();
    g.strokeStyle=hero.trim; g.lineWidth=2.5; g.beginPath(); g.arc(0,0,12,0,7); g.stroke();
    g.fillStyle=hero.trim; g.beginPath(); g.arc(0,0,3.2,0,7); g.fill();
    drawEmblem(g, hero.emblem);
    g.restore();
    g.restore();
  }
  function drawLeg(g, x, swing, hero){
    g.save(); g.translate(x,-18); g.rotate(swing*0.05);
    g.fillStyle='#6b4a2a'; roundRect(g,-4,0,8,16,3); g.fill();
    g.fillStyle='#3a2614'; roundRect(g,-5,14,11,5,2); g.fill();
    g.restore();
  }
  function drawEmblem(g, kind){
    g.save(); g.strokeStyle='#fff'; g.fillStyle='#fff'; g.lineWidth=1.4;
    if(kind==='sun'){ for(let i=0;i<8;i++){ g.save(); g.rotate(i*Math.PI/4); g.beginPath(); g.moveTo(0,-5); g.lineTo(0,-8.5); g.stroke(); g.restore(); } }
    else if(kind==='tree'){ g.beginPath(); g.moveTo(0,5); g.lineTo(0,-2); g.stroke(); g.beginPath(); g.moveTo(0,-6); g.lineTo(-4,-1); g.moveTo(0,-6); g.lineTo(4,-1); g.moveTo(0,-2); g.lineTo(-3,2); g.moveTo(0,-2); g.lineTo(3,2); g.stroke(); }
    else { g.beginPath(); g.moveTo(-6,1); g.quadraticCurveTo(-3,-4,0,1); g.quadraticCurveTo(3,6,6,1); g.stroke(); }
    g.restore();
  }
  function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

      (isTouch?'Кнопки ◀ ▶ — идти, ⤴ — прыжокъ.':'<span class="kbd">←</span><span class="kbd">→</span> — идти, <span class="kbd">Пробѣлъ</span>/<span class="kbd">↑</span> — прыжокъ.')+'</p>'+

  /* ====================== GAME ENGINE ====================== */
  let G=null, raf=null;
  const keys={left:false,right:false,jump:false,_jumpHeld:false};

  const BASE_H=52, BIG_H=74;
  function startLevel(idx){
    const data=LEVEL_FNS[idx]();
    const hero=HEROES[prog.hero];
    const boxCoins=(data.blocks||[]).filter(b=>b.kind==='coinbox').length;
    G={
      idx, data, hero, cam:0,
      coinsGot:0, totalCoins:data.coins.length+boxCoins,
      hearts:3, inv:0, paused:false, finished:false, t:0, flash:0,
      respawn:{x:data.start.x, y:data.start.y},
      coins: data.coins.map(c=>({x:c.x,y:c.y,got:false})),
      enemies: data.enemies.map(e=>({x:e.x,y:e.y,type:e.type||'raven',x0:e.x0,x1:e.x1,dir:e.dir||1,dead:false,wig:0})),
      checks: data.checkpoints.map(c=>({x:c.x,y:c.y,on:false})),
      blocks: (data.blocks||[]).map(b=>({x:b.x,y:b.y,w:b.w,h:b.h,kind:b.kind,used:false,bump:0})),
      hazards: data.hazards||[],
      powerups: [], parts: [],
      p:{ x:data.start.x, y:data.start.y, w:30, h:BASE_H, vx:0, vy:0, onGround:false, facing:1, state:'idle', anim:0, big:false }
    };
    showGame(); updateHUD(); last=performance.now();
    if(raf) cancelAnimationFrame(raf);
    raf=requestAnimationFrame(frame);
  }

  let last=0;
  function frame(ts){
    let dt=(ts-last)/16.667; last=ts; if(dt>2.4) dt=2.4;
    if(G && !G.paused && !G.finished){ update(dt); }
    if(G){ render(); }
    raf=requestAnimationFrame(frame);
  }

  function rectsOverlap(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

  function enemyBox(e){
    if(e.type==='boar') return {x:e.x-20,y:e.y-30,w:40,h:30};
    if(e.type==='hedgehog') return {x:e.x-16,y:e.y-24,w:32,h:24};
    return {x:e.x-16,y:e.y-26,w:32,h:26}; // raven
  }
  function addParts(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*7, s=2+Math.random()*3.2;
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.4,col,life:18+Math.random()*10}); } }
  function spawnPowerup(b){ G.powerups.push({x:b.x+b.w/2, y:b.y-2, vx:1.7, vy:-3, got:false}); }
  function powerUp(){ const p=G.p; sCoin(); sBell(560);
    if(!p.big){ p.big=true; p.y-=(BIG_H-BASE_H); p.h=BIG_H; }
    addParts(p.x+p.w/2,p.y+10,'#ffe39a',12); G.flash=8; }
  function hitBlock(b){
    if(b.kind==='used') return;
    if(b.kind==='brick'){
      if(G.p.big){ b.broken=true; addParts(b.x+18,b.y+12,'#b8612f',12); sStomp(); }
      else { b.bump=6; sStomp(); }
    } else if(b.kind==='coinbox'){
      b.kind='used'; b.bump=6; G.coinsGot++; sCoin(); updateHUD(); addParts(b.x+18,b.y,'#e6b93b',7);
    } else if(b.kind==='powbox'){
      b.kind='used'; b.bump=6; spawnPowerup(b); sBell(520);
    }
  }
  function applyPlayerHit(){
    if(G.finished || G.inv>0) return;
    const p=G.p;
    if(p.big){ p.big=false; p.y+=(BIG_H-BASE_H); p.h=BASE_H; G.inv=70; sHurt(); p.vy=Math.min(p.vy,-6); }
    else hurt(false);
  }

  function update(dt){
    G.t+=dt; const p=G.p, hero=G.hero, L=G.data;
    if(G.flash>0) G.flash-=dt;
    const solids=L.platforms.concat(G.blocks);
    const dir=(keys.left?-1:0)+(keys.right?1:0);
    const target=dir*hero.speed;
    p.vx += (target-p.vx)*Math.min(1,0.28*dt);
    if(dir!==0) p.facing=dir;
    if(keys.jump && p.onGround){ p.vy=-hero.jump; p.onGround=false; sJump(); keys._jumpHeld=true; }
    if(!keys.jump && keys._jumpHeld){ if(p.vy<-4) p.vy=-4; keys._jumpHeld=false; }
    p.vy += 0.8*dt; if(p.vy>18) p.vy=18;
    p.x += p.vx*dt;
    for(const pl of solids){ if(rectsOverlap(p,pl)){ if(p.vx>0) p.x=pl.x-p.w; else if(p.vx<0) p.x=pl.x+pl.w; p.vx=0; } }
    if(p.x<0) p.x=0;
    p.onGround=false;
    p.y += p.vy*dt;
    for(const pl of solids){ if(rectsOverlap(p,pl)){
      if(p.vy>0){ p.y=pl.y-p.h; p.vy=0; p.onGround=true; }
      else if(p.vy<0){ p.y=pl.y+pl.h; p.vy=0; if(pl.kind) hitBlock(pl); } } }
    G.blocks=G.blocks.filter(b=>!b.broken);
    for(const b of G.blocks){ if(b.bump>0) b.bump-=dt; }
    if(!p.onGround) p.state='jump';
    else if(Math.abs(p.vx)>0.6){ p.state='run'; p.anim+=Math.abs(p.vx)*0.16*dt; }
    else p.state='idle';
    if(p.y > H+40){ hurt(true); }
    for(const c of G.coins){ if(!c.got){ if(Math.abs((p.x+p.w/2)-c.x)<26 && Math.abs((p.y+p.h/2)-(c.y))<30){ c.got=true; G.coinsGot++; sCoin(); updateHUD(); } } }
    for(const c of G.checks){ if(!c.on && p.x+p.w/2>c.x){ c.on=true; G.respawn={x:c.x-20,y:c.y-60}; sBell(420); } }
    if(G.inv>0) G.inv-=dt;
    // hazards (spikes)
    for(const hz of G.hazards){ if(G.inv<=0 && rectsOverlap(p,hz)){ applyPlayerHit(); break; } }
    // power-ups
    for(const u of G.powerups){ if(u.got) continue;
      u.vy+=0.5*dt; if(u.vy>12)u.vy=12; u.x+=u.vx*dt; u.y+=u.vy*dt;
      for(const pl of solids){ if(u.x>pl.x-14 && u.x<pl.x+pl.w+14 && u.y>=pl.y-16 && u.y<=pl.y+12 && u.vy>=0){ u.y=pl.y-12; u.vy=0; } }
      if(u.x<16) u.vx=Math.abs(u.vx);
      if(rectsOverlap(p,{x:u.x-12,y:u.y-12,w:24,h:24})){ u.got=true; powerUp(); } }
    G.powerups=G.powerups.filter(u=>!u.got);
    // particles
    for(const pt of G.parts){ pt.vy+=0.5*dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt; }
    G.parts=G.parts.filter(pt=>pt.life>0);
    // enemies
    for(const e of G.enemies){ if(e.dead){ e.wig+=dt; continue; }
      const sp = e.type==='boar'?2.5 : e.type==='hedgehog'?1.1 : 1.5;
      e.x += e.dir*sp*dt;
      if(e.x<e.x0){ e.x=e.x0; e.dir=1; } if(e.x>e.x1){ e.x=e.x1; e.dir=-1; }
      const eb=enemyBox(e);
      if(rectsOverlap(p,eb)){
        const stomp = p.vy>1.5 && (p.y+p.h) < eb.y+16;
        if(stomp && e.type!=='hedgehog'){ e.dead=true; e.wig=0; p.vy=-hero.jump*0.62; sStomp(); addParts(e.x,eb.y,'#6a5238',6); }
        else { applyPlayerHit(); }
      }
    }
    if(p.x+p.w/2 > L.goalX){ winLevel(); }
    const tcam = p.x - W*0.36;
    G.cam += (tcam-G.cam)*Math.min(1,0.12*dt);
    if(G.cam<0) G.cam=0; if(G.cam>L.width-W) G.cam=L.width-W;
  }

  function hurt(fell){
    if(G.finished) return;
    G.hearts--; sHurt(); updateHUD();
    if(G.hearts<=0){ loseLevel(); return; }
    G.inv=70;
    const p=G.p;
    if(fell){ if(p.big){ p.big=false; p.y+=(BIG_H-BASE_H); p.h=BASE_H; }
      p.x=G.respawn.x; p.y=G.respawn.y; p.vx=0; p.vy=0;
      G.cam=Math.max(0,Math.min(G.data.width-W, p.x-W*0.36)); }
    else { p.vy=-8; p.vx=-p.facing*6; }
  }

  function updateHUD(){
    if(!G) return;
    document.getElementById('hud-l').innerHTML='❤'.repeat(Math.max(0,G.hearts))+'<span style="opacity:.35">'+'❤'.repeat(Math.max(0,3-G.hearts))+'</span>';
    document.getElementById('hud-r').innerHTML='⦿ '+G.coinsGot+' / '+G.totalCoins+'<br><span style="font-size:.8rem">'+G.data.name+'</span>';
  }

  function winLevel(){
    if(G.finished) return; G.finished=true; fanfare();
    prog.done[G.idx]=true; save();
    const more = G.idx<NLEV-1;
    const ov=mkOverlay('<div class="big-seal">★</div><h2>Земля пройдена!</h2>'+
      '<p>'+G.hero.name+' собралъ <b>'+G.coinsGot+' / '+G.totalCoins+'</b> златниковъ.</p>'+
      (allDone()?'<p>Всѣ три земли покорены!</p>':'')+
      '<button class="btn big rust" id="next">'+(allDone()?'Грамота героя ▸':(more?'Слѣдующая земля ▸':'Къ картѣ ▸'))+'</button>'+
      '<button class="btn" id="map">Къ картѣ</button>');
    document.getElementById('next').onclick=()=>{ ov.remove(); const ni=G.idx+1; stopGame(); if(allDone()) renderWin(); else if(more) introLevel(ni); else renderMap(); };
    document.getElementById('map').onclick=()=>{ ov.remove(); stopGame(); renderMap(); };
  }
  function loseLevel(){
    if(G.finished) return; G.finished=true;
    const idx=G.idx;
    const ov=mkOverlay('<div class="big-seal">⚔</div><h2>Ой, не вышло…</h2>'+
      '<p>Витязь притомился. Попробуй ещё разъ!</p>'+
      '<button class="btn big rust" id="retry">Снова ▸</button>'+
      '<button class="btn" id="map">Къ картѣ</button>');
    document.getElementById('retry').onclick=()=>{ ov.remove(); startLevel(idx); };
    document.getElementById('map').onclick=()=>{ ov.remove(); stopGame(); renderMap(); };
  }
  function stopGame(){ if(raf) cancelAnimationFrame(raf); raf=null; G=null; }

  function renderWin(){
    showUI();
    $ui.innerHTML='<div class="topbar"><button class="btn mini" id="back">‹ Карта</button>'+muteBtn()+'</div>'+
      '<p class="eyebrow">Слава!</p><h1>Грамота героя</h1>'+
      '<div class="node" style="display:block;text-align:center"><div class="big-seal">🏅</div>'+
      '<div class="seals-row">★ ★ ★</div>'+
      '<p><b>'+HEROES[prog.hero].name+'</b> прошёлъ всю Новгородскую землю:</p>'+
      '<div class="fact">• торгъ на Ярославовомъ дворищѣ и ладьи Волхова;<br>• стѣны и башни Детинца-Кремля;<br>• золотая глава Софійскаго собора.</div>'+
      '<button class="btn big rust" id="again">Пройти заново</button>'+
      '<button class="btn big" id="hero2">Другой витязь</button></div>'+
      '<p class="foot"><a class="link" href="boi.html">⚔️ Испытать силу въ бою ▸</a><br><a class="link" href="index.html">← къ плану поѣздки</a></p>';
    document.getElementById('again').onclick=()=>{ prog.done=new Array(NLEV).fill(false); save(); renderMap(); };
    document.getElementById('hero2').onclick=()=>{ prog.done=new Array(NLEV).fill(false); save(); renderHeroes(); };
    document.getElementById('back').onclick=renderMap;
    bindMute();
  }

  function mkOverlay(inner){ const ov=document.createElement('div'); ov.className='overlay'; ov.innerHTML='<div class="sheet">'+inner+'</div>';
    const host=document.fullscreenElement||document.webkitFullscreenElement||document.body; host.appendChild(ov); return ov; }

  /* ====================== RENDER ====================== */
  function render(){
    const L=G.data, cam=G.cam;
    ctx.clearRect(0,0,W,H);
    drawBackground(L.theme, cam);
    ctx.save(); ctx.translate(-cam,0);
    for(const pl of L.platforms) drawPlatform(pl, L.theme);
    for(const b of G.blocks) drawBlock(b);
    for(const hz of G.hazards) drawHazard(hz);
    for(const c of G.checks) drawFlag(c);
    for(const c of G.coins){ if(!c.got) drawCoin(c.x,c.y); }
    drawGoal(L.goalKind, L.goalX);
    for(const u of G.powerups) drawPowerup(u);
    for(const e of G.enemies) drawEnemy(e);
    for(const pt of G.parts){ ctx.globalAlpha=Math.max(0,Math.min(1,pt.life/12)); ctx.fillStyle=pt.col; ctx.fillRect(pt.x-2,pt.y-2,4,4); ctx.globalAlpha=1; }
    const p=G.p; const blink = G.inv>0 && (Math.floor(G.t*0.3)%2===0);
    if(!blink) drawKnight(ctx, p.x+p.w/2, p.y+p.h, p.big?2.05:1.55, G.hero, p.facing, p.state==='run'?p.anim*6:G.t, p.state);
    ctx.restore();
    if(G.flash>0){ ctx.fillStyle='rgba(255,240,190,'+(G.flash/8*0.4)+')'; ctx.fillRect(0,0,W,H); }
    if(G.paused){ ctx.fillStyle='rgba(40,28,16,.55)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff'; ctx.font='32px "Ruslan Display",serif'; ctx.textAlign='center'; ctx.fillText('Пауза', W/2, H/2); ctx.textAlign='left'; }
  }

  function drawBackground(theme, cam){
    let g=ctx.createLinearGradient(0,0,0,H);
    if(theme==='sofia'){ g.addColorStop(0,'#fce8c0'); g.addColorStop(1,'#bfe0ef'); }
    else { g.addColorStop(0,'#aee0f2'); g.addColorStop(1,'#dff1f7'); }
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // sun with soft halo
    ctx.fillStyle='rgba(255,236,180,.35)'; ctx.beginPath(); ctx.arc(W-110,86,64,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,243,200,.95)'; ctx.beginPath(); ctx.arc(W-110,86,40,0,7); ctx.fill();
    // far hill layer (deep parallax)
    ctx.fillStyle = theme==='sofia'? 'rgba(190,170,120,.6)':'rgba(150,180,150,.55)';
    const hx=cam*0.08; ctx.beginPath(); ctx.moveTo(0,H);
    for(let x=-60;x<=W+60;x+=60){ ctx.lineTo(x, 330 + Math.sin((x+hx)*0.004)*40); } ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';
    const cx=cam*0.15;
    for(let i=0;i<6;i++){ const x=((i*260 - cx)% (W+260)+W+260)%(W+260)-130; cloud(x, 60+ (i%3)*26); }
    drawSkyline(theme, cam*0.4);
    ctx.fillStyle = theme==='sofia'? '#c8b98a':'#bcd3a0';
    ctx.beginPath(); ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=40){ ctx.lineTo(x, 420 + Math.sin((x+cam*0.5)*0.01)*16); }
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  }
  function cloud(x,y){ ctx.beginPath(); ctx.arc(x,y,18,0,7); ctx.arc(x+20,y+4,22,0,7); ctx.arc(x+44,y,16,0,7); ctx.arc(x+22,y-8,16,0,7); ctx.fill(); }
  function drawSkyline(theme, off){
    const base=380;
    function tile(drawer, span){ const start=-(((off%span)+span)%span); for(let x=start; x<W+span; x+=span) drawer(x); }
    if(theme==='torg'){
      tile(x=>{
        ctx.fillStyle='#9fb6c4'; roundRect(ctx,x+20,base-70,80,70,4); ctx.fill();
        ctx.fillStyle='#7a8fa0'; ctx.beginPath(); ctx.moveTo(x+14,base-70); ctx.lineTo(x+60,base-104); ctx.lineTo(x+106,base-70); ctx.closePath(); ctx.fill();
      }, 320);
    } else if(theme==='kreml'){
      tile(x=>{
        ctx.fillStyle='#a36a52'; ctx.fillRect(x, base-60, 300, 60);
        for(let z=0; z<300; z+=30){ ctx.fillRect(x+z, base-72, 16, 14); }
        ctx.fillRect(x+120, base-120, 60, 120);
        for(let z=0; z<60; z+=30){ ctx.fillRect(x+120+z, base-134, 16, 16); }
        ctx.fillStyle='#7e4f3e'; ctx.beginPath(); ctx.moveTo(x+114,base-120); ctx.lineTo(x+150,base-156); ctx.lineTo(x+186,base-120); ctx.closePath(); ctx.fill();
      }, 300);
    } else {
      tile(x=>{
        ctx.fillStyle='#eadfc6'; ctx.fillRect(x+10, base-90, 240, 90);
        const domes=[[x+60,'#7e8b96'],[x+130,'#c79a3b'],[x+200,'#7e8b96']];
        domes.forEach(d=>{ ctx.fillStyle=d[1]; ctx.beginPath(); ctx.moveTo(d[0]-20,base-90); ctx.quadraticCurveTo(d[0]-22,base-128,d[0],base-138); ctx.quadraticCurveTo(d[0]+22,base-128,d[0]+20,base-90); ctx.closePath(); ctx.fill();
          ctx.strokeStyle='#caa'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(d[0],base-138); ctx.lineTo(d[0],base-150); ctx.stroke(); });
      }, 280);
    }
  }
  function drawPlatform(pl, theme){
    const x=pl.x,y=pl.y,w=pl.w,h=pl.h;
    if(pl.wood){ ctx.fillStyle='#b07a44'; roundRect(ctx,x,y,w,h,5); ctx.fill(); ctx.strokeStyle='#7a512b'; ctx.lineWidth=2; ctx.stroke();
      ctx.strokeStyle='rgba(90,55,25,.5)'; for(let i=x+10;i<x+w;i+=18){ ctx.beginPath(); ctx.moveTo(i,y+3); ctx.lineTo(i,y+h-3); ctx.stroke(); } return; }
    if(pl.wall){ ctx.fillStyle='#b06b54'; roundRect(ctx,x,y,w,h,4); ctx.fill(); ctx.fillStyle='rgba(120,70,55,.5)';
      for(let by=y+4;by<y+h;by+=12){ for(let bx=x+((Math.floor((by-y)/12)%2)?0:14);bx<x+w-6;bx+=28){ ctx.fillRect(bx+2,by+2,24,8);} } return; }
    if(pl.stone){ ctx.fillStyle='#d8cdae'; roundRect(ctx,x,y,w,h,4); ctx.fill(); ctx.strokeStyle='#a99'; ctx.lineWidth=1.5; ctx.strokeRect(x+3,y+3,w-6,h-6); return; }
    const gt = theme==='kreml'? '#7fae5b' : theme==='sofia'? '#86b562' : '#7caa55';
    ctx.fillStyle=gt; roundRect(ctx,x,y,w,h,6); ctx.fill();
    ctx.fillStyle='rgba(60,40,18,.18)'; ctx.fillRect(x,y+14,w,h-14);
    ctx.fillStyle='#6a4a28'; ctx.fillRect(x,y+16,w,3);
    ctx.fillStyle=gt; for(let i=x+12;i<x+w-6;i+=34){ ctx.beginPath(); ctx.moveTo(i,y); ctx.lineTo(i+5,y-7); ctx.lineTo(i+10,y); ctx.closePath(); ctx.fill(); }
  }
  function drawCoin(x,y){ const s=Math.abs(Math.sin(G.t*0.12+x*0.01));
    ctx.save(); ctx.translate(x,y); ctx.scale(0.4+0.6*s,1);
    ctx.fillStyle='#e6b93b'; ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill();
    ctx.strokeStyle='#a9781f'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#fff4cc'; ctx.font='bold 13px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('₴',0,1); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.restore(); }
  function drawFlag(c){ const sway=Math.sin(G.t*0.1)*4;
    ctx.strokeStyle='#5a3a1c'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(c.x,c.y-66); ctx.stroke();
    ctx.fillStyle=c.on? '#3f7d4e' : '#b23b2e'; ctx.beginPath(); ctx.moveTo(c.x,c.y-66); ctx.lineTo(c.x+34+sway,c.y-58); ctx.lineTo(c.x,c.y-50); ctx.closePath(); ctx.fill(); }
  function drawRaven(e){
    if(e.dead){ ctx.save(); ctx.globalAlpha=Math.max(0,1-e.wig*0.04); ctx.translate(e.x,e.y-10+e.wig*1.2);
      ctx.fillStyle='#2c2c33'; ctx.beginPath(); ctx.ellipse(0,0,16,7,0,0,7); ctx.fill(); ctx.restore(); return; }
    const fly=Math.sin(G.t*0.3)*4;
    ctx.save(); ctx.translate(e.x, e.y-16+ (Math.sin(G.t*0.2)*2));
    if(e.dir<0) ctx.scale(-1,1);
    ctx.fillStyle='#2c2c33';
    ctx.beginPath(); ctx.ellipse(0,0,15,9,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(11,-5,6,0,7); ctx.fill();
    ctx.fillStyle='#e0a020'; ctx.beginPath(); ctx.moveTo(16,-6); ctx.lineTo(24,-4); ctx.lineTo(16,-2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#1c1c22'; ctx.beginPath(); ctx.moveTo(-2,-4); ctx.lineTo(-16,-12-fly); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(12,-6,1.6,0,7); ctx.fill();
    ctx.restore();
  }
  function drawEnemy(e){
    if(e.dead && e.type!=='raven'){ drawDeadFoe(e); return; }
    if(e.type==='boar') drawBoar(e);
    else if(e.type==='hedgehog') drawHedgehog(e);
    else drawRaven(e);
  }
  function drawDeadFoe(e){ ctx.save(); ctx.globalAlpha=Math.max(0,1-e.wig*0.04); ctx.translate(e.x,e.y-6+e.wig*1.4);
    ctx.fillStyle='#4a3826'; ctx.beginPath(); ctx.ellipse(0,0,20,6,0,0,7); ctx.fill(); ctx.restore(); }
  function drawBoar(e){ const trot=Math.sin(G.t*0.4)*2;
    ctx.save(); ctx.translate(e.x,e.y-2); if(e.dir>0) ctx.scale(-1,1);
    ctx.fillStyle='rgba(40,25,10,.18)'; ctx.beginPath(); ctx.ellipse(0,2,22,4,0,0,7); ctx.fill();
    ctx.strokeStyle='#3a2c1c'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-9,-6); ctx.lineTo(-9+trot,2); ctx.moveTo(9,-6); ctx.lineTo(9-trot,2); ctx.stroke();
    ctx.fillStyle='#5a4632'; ctx.beginPath(); ctx.ellipse(0,-16,22,14,0,0,7); ctx.fill();
    ctx.fillStyle='#473526'; ctx.beginPath(); ctx.moveTo(0,-28); ctx.lineTo(6,-36); ctx.lineTo(9,-26); ctx.lineTo(2,-22); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5a4632'; ctx.beginPath(); ctx.ellipse(-19,-12,10,9,0,0,7); ctx.fill();
    ctx.fillStyle='#3a2a1c'; ctx.beginPath(); ctx.ellipse(-27,-11,3.5,4,0,0,7); ctx.fill();
    ctx.fillStyle='#2a1f14'; ctx.beginPath(); ctx.arc(-22,-15,1.8,0,7); ctx.fill();
    ctx.fillStyle='#e8e0cf'; ctx.beginPath(); ctx.moveTo(-26,-8); ctx.lineTo(-31,-13); ctx.lineTo(-25,-12); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  function drawHedgehog(e){
    ctx.save(); ctx.translate(e.x,e.y-2); if(e.dir>0) ctx.scale(-1,1);
    ctx.fillStyle='rgba(40,25,10,.18)'; ctx.beginPath(); ctx.ellipse(0,2,16,4,0,0,7); ctx.fill();
    ctx.strokeStyle='#2a2018'; ctx.lineWidth=2.4; ctx.lineCap='round';
    for(let i=-4;i<=4;i++){ const a=i*0.3; const sx=Math.sin(a)*11, sy=-12-Math.cos(a)*9;
      ctx.beginPath(); ctx.moveTo(sx*0.6,sy*0.7-2); ctx.lineTo(sx*1.7,sy*1.25-2); ctx.stroke(); }
    ctx.fillStyle='#6a5238'; ctx.beginPath(); ctx.ellipse(0,-11,15,12,0,0,7); ctx.fill();
    ctx.fillStyle='#e8d9c0'; ctx.beginPath(); ctx.ellipse(-12,-7,6,5,0,0,7); ctx.fill();
    ctx.fillStyle='#2a1f14'; ctx.beginPath(); ctx.arc(-15,-8,1.6,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(-17,-5,1.3,0,7); ctx.fill();
    ctx.restore();
  }
  function drawBlock(b){
    const off=b.bump>0?Math.sin((1-b.bump/6)*Math.PI)*8:0; const yy=b.y-off;
    if(b.kind==='used'){ ctx.fillStyle='#8a6a3a'; roundRect(ctx,b.x,yy,b.w,b.h,4); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.2)'; ctx.fillRect(b.x+4,yy+4,b.w-8,b.h-8); return; }
    if(b.kind==='brick'){ ctx.fillStyle='#b8612f'; roundRect(ctx,b.x,yy,b.w,b.h,3); ctx.fill();
      ctx.fillStyle='rgba(255,210,160,.25)'; ctx.fillRect(b.x+2,yy+2,b.w-4,4);
      ctx.strokeStyle='#7a3c18'; ctx.lineWidth=2; ctx.stroke();
      ctx.strokeStyle='rgba(80,40,15,.55)'; ctx.lineWidth=1.4; ctx.beginPath();
      ctx.moveTo(b.x,yy+b.h/2); ctx.lineTo(b.x+b.w,yy+b.h/2);
      ctx.moveTo(b.x+b.w/2,yy); ctx.lineTo(b.x+b.w/2,yy+b.h/2);
      ctx.moveTo(b.x+b.w*0.25,yy+b.h/2); ctx.lineTo(b.x+b.w*0.25,yy+b.h);
      ctx.moveTo(b.x+b.w*0.75,yy+b.h/2); ctx.lineTo(b.x+b.w*0.75,yy+b.h); ctx.stroke(); return; }
    const glow=0.5+0.5*Math.abs(Math.sin(G.t*0.1));
    ctx.fillStyle=b.kind==='powbox'?'#9a52c4':'#d9a72b'; roundRect(ctx,b.x,yy,b.w,b.h,4); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(b.x+3,yy+3,b.w-6,5);
    ctx.strokeStyle='#7a5a18'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,'+(0.4+0.4*glow)+')'; ctx.font='bold 22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.kind==='powbox'?'❖':'?',b.x+b.w/2,yy+b.h/2+2); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
  function drawHazard(hz){ const n=Math.max(2,Math.floor(hz.w/13)); const sw=hz.w/n;
    ctx.fillStyle='#5a5f66'; ctx.fillRect(hz.x,hz.y+hz.h-5,hz.w,5);
    for(let i=0;i<n;i++){ const x=hz.x+i*sw;
      ctx.fillStyle='#9aa0a6'; ctx.beginPath(); ctx.moveTo(x,hz.y+hz.h); ctx.lineTo(x+sw/2,hz.y); ctx.lineTo(x+sw,hz.y+hz.h); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.moveTo(x+sw/2,hz.y); ctx.lineTo(x+sw*0.62,hz.y+hz.h*0.5); ctx.lineTo(x+sw/2,hz.y+hz.h*0.5); ctx.closePath(); ctx.fill(); }
  }
  function drawPowerup(u){ const bob=Math.sin(G.t*0.2)*2;
    ctx.save(); ctx.translate(u.x,u.y+bob);
    ctx.fillStyle='rgba(255,228,150,.45)'; ctx.beginPath(); ctx.arc(0,0,16,0,7); ctx.fill();
    ctx.fillStyle='#d9a72b'; ctx.beginPath(); ctx.moveTo(-11,7); ctx.quadraticCurveTo(-13,-12,0,-14); ctx.quadraticCurveTo(13,-12,11,7); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#7a5a18'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#caa258'; ctx.fillRect(-11,5,22,4);
    ctx.fillStyle='#b6bbc0'; ctx.fillRect(-1.5,-21,3,8);
    ctx.fillStyle='#fff4cc'; ctx.beginPath(); ctx.arc(0,-23,2.2,0,7); ctx.fill();
    ctx.restore();
  }
  function drawGoal(kind, gx){
    if(kind==='bell'){
      ctx.fillStyle='#7a512b'; ctx.fillRect(gx-6,300,12,160);
      ctx.fillStyle='#5a3a1c'; ctx.fillRect(gx-60,296,120,10);
      ctx.fillStyle='#b8902f'; ctx.beginPath(); ctx.moveTo(gx-26,300); ctx.quadraticCurveTo(gx-30,250,gx,242); ctx.quadraticCurveTo(gx+30,250,gx+26,300); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#7a5a18'; ctx.lineWidth=3; ctx.stroke();
      ctx.fillStyle='#8a6a20'; ctx.fillRect(gx-30,300,60,8);
    } else if(kind==='gate'){
      ctx.fillStyle='#a36a52'; ctx.fillRect(gx-50,250,100,210);
      for(let z=0;z<100;z+=25) ctx.fillRect(gx-50+z,236,14,14);
      ctx.fillStyle='#3a2614'; ctx.beginPath(); ctx.moveTo(gx-26,460); ctx.lineTo(gx-26,330); ctx.quadraticCurveTo(gx,300,gx+26,330); ctx.lineTo(gx+26,460); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#caa258'; ctx.fillRect(gx-3,204,6,46);
    } else {
      ctx.fillStyle='#eadfc6'; ctx.fillRect(gx-55,300,110,160);
      ctx.fillStyle='#c79a3b'; ctx.beginPath(); ctx.moveTo(gx-40,300); ctx.quadraticCurveTo(gx-46,230,gx,210); ctx.quadraticCurveTo(gx+46,230,gx+40,300); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#a9781f'; ctx.lineWidth=2; ctx.stroke();
      ctx.strokeStyle='#a9781f'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(gx,210); ctx.lineTo(gx,188); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(gx-7,196); ctx.lineTo(gx+7,196); ctx.stroke();
    }
    const a=0.3+0.3*Math.abs(Math.sin(G.t*0.08));
    ctx.fillStyle='rgba(231,185,59,'+a+')'; ctx.beginPath(); ctx.arc(gx, 250, 8,0,7); ctx.fill();
  }

  /* ====================== CONTROLS ====================== */
  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){ keys.left=true; }
    else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){ keys.right=true; }
    else if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W'){ keys.jump=true; e.preventDefault(); }
    else if(e.key==='Escape'){ if(G&&!G.finished){ G.paused=!G.paused; if(!G.paused) last=performance.now(); } }
  });
  window.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
    else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
    else if(e.key===' '||e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.jump=false;
  });
  function bindHold(id,prop){ const el=document.getElementById(id);
    const on=e=>{ e.preventDefault(); audio(); keys[prop]=true; };
    const off=e=>{ e.preventDefault(); keys[prop]=false; };
    el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off); el.addEventListener('touchcancel',off);
    el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
  }
  bindHold('b-left','left'); bindHold('b-right','right'); bindHold('b-jump','jump');
  document.getElementById('pausebtn').onclick=()=>{
    if(!G||G.finished) return;
    if(!G.paused){ G.paused=true; const ov=mkOverlay('<h2>Пауза</h2><button class="btn big rust" id="resume">Продолжить ▸</button><button class="btn" id="toMap">Къ картѣ</button>');
      document.getElementById('resume').onclick=()=>{ ov.remove(); G.paused=false; last=performance.now(); };
      document.getElementById('toMap').onclick=()=>{ ov.remove(); stopGame(); renderMap(); };
    }
  };

  /* ===================== FULLSCREEN ===================== */
  function fitStage(){
    if(document.fullscreenElement || document.webkitFullscreenElement){
      const ar=W/H; const ww=window.innerWidth, wh=window.innerHeight;
      let w=ww, h=w/ar; if(h>wh){ h=wh; w=h*ar; }
      cv.style.width=Math.floor(w)+'px'; cv.style.height=Math.floor(h)+'px';
    } else { cv.style.width=''; cv.style.height=''; }
  }
  function toggleFullscreen(){
    const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
    if(!fsEl){
      const req=$stage.requestFullscreen||$stage.webkitRequestFullscreen;
      if(req) req.call($stage);
      $stage.classList.add('fs');
      if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
    } else {
      const ex=document.exitFullscreen||document.webkitExitFullscreen;
      if(ex) ex.call(document);
      $stage.classList.remove('fs');
    }
  }
  function exitFS(){
    if(document.fullscreenElement||document.webkitFullscreenElement){
      const ex=document.exitFullscreen||document.webkitExitFullscreen; if(ex) ex.call(document);
    }
    $stage.classList.remove('fs'); cv.style.width=''; cv.style.height='';
  }
  document.getElementById('fsbtn').onclick=toggleFullscreen;
  document.addEventListener('fullscreenchange',()=>{ if(!document.fullscreenElement) $stage.classList.remove('fs'); fitStage(); });
  document.addEventListener('webkitfullscreenchange',fitStage);
  window.addEventListener('resize',fitStage);
  window.addEventListener('orientationchange',()=>setTimeout(fitStage,200));

  /* ====================== GO ====================== */
  renderHome();
})();
</script>
</body>
